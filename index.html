   calc:d=>{const v=(parseFloat(d.largo||0)*parseFloat(d.ancho||0)*parseFloat(d.prof||0))/1000000;return v>0?v.toFixed(3)+' L':'—';}},
  {id:'area',label:'Area',unit:'m²',

   calc:d=>{const a=(parseFloat(d.d1||0)*parseFloat(d.d2||0))/1000000;return a>0?a.toFixed(4)+' m²':'—';}},
  {id:'linear',label:'Linear m',unit:'m',

const fmtDate=iso=>{if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-NZ')+' '+d.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});};
// ── INDEXEDDB STORAGE — no size limit, handles large base64 photos ────────────
const DB_NAME='ral-quicksurvey';
const DB_VER=1;
const STORE='projects';
const PRICE_STORE='prices';

let _db=null;
function openDB(){
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id'});
      if(!db.objectStoreNames.contains(PRICE_STORE))db.createObjectStore(PRICE_STORE,{keyPath:'id'});
    };
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbGetAll(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).getAll();
    req.onsuccess=e=>res(e.target.result||[]);
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbPut(project){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    const req=tx.objectStore(STORE).put(project);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbDelete(id){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    const req=tx.objectStore(STORE).delete(id);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbGetPrices(projectId){
  const db=await openDB();
  return new Promise((res)=>{
    const tx=db.transaction(PRICE_STORE,'readonly');
    const req=tx.objectStore(PRICE_STORE).get(projectId);
    req.onsuccess=e=>res(e.target.result?e.target.result.prices:{});
    req.onerror=()=>res({});
  });
}
async function dbSavePrices(projectId,prices){
  const db=await openDB();
  return new Promise((res)=>{
    const tx=db.transaction(PRICE_STORE,'readwrite');
    tx.objectStore(PRICE_STORE).put({id:projectId,prices});
    tx.oncomplete=()=>res();
    tx.onerror=()=>res();
  });
}



// ── COMPRESS image before watermarking (max 1200px wide, quality 0.65) ────────
async function compress(dataUrl,maxW=900,quality=0.5){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const scale=img.width>maxW?maxW/img.width:1;
      const w=Math.round(img.width*scale);
      const h=Math.round(img.height*scale);
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ── WATERMARK ─────────────────────────────────────────────────────────────────
async function wm(dataUrl,pin){
  // Compress first to keep IndexedDB storage lean
  const compressed=await compress(dataUrl);
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.width;c.height=img.height;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0);
      const repType=(RT.find(r=>r.id===pin.repairType)||{label:''}).label;
      const line1='#'+pin.id+'  '+(pin.repairName||'Repair')+'  '+repType+'  '+getMeas(pin);
      const line2=new Date().toLocaleString('en-NZ',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const line3=USER;
      const fs=Math.max(20,Math.round(img.height*0.033));
      const lh=Math.round(fs*1.6);
      const pad=Math.round(fs*0.75);
      const stripH=lh*3+pad*2;
      ctx.globalAlpha=0.85;
      ctx.fillStyle='#0d1117';
      ctx.fillRect(0,img.height-stripH,img.width,stripH);
      ctx.globalAlpha=1;
      ctx.fillStyle='#2563eb';
      ctx.fillRect(0,img.height-stripH,Math.max(5,Math.round(img.width*0.005)),stripH);
      const tx=pad+Math.max(5,Math.round(img.width*0.005))+6;
      ctx.font='700 '+fs+'px Arial,sans-serif';
      ctx.fillStyle='#ffffff';
      ctx.fillText(line1,tx,img.height-stripH+pad+fs);
      ctx.font='400 '+fs+'px Arial,sans-serif';
      ctx.fillStyle='#94a3b8';
      ctx.fillText(line2,tx,img.height-stripH+pad+lh+fs);
      ctx.font='600 '+fs+'px Arial,sans-serif';
      ctx.fillStyle='#60a5fa';
      ctx.fillText(line3,tx,img.height-stripH+pad+lh*2+fs);
      resolve(c.toDataURL('image/jpeg',0.72));
    };
    img.onerror=()=>resolve(compressed);
    img.src=compressed;
  });
}

    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:C.bg}}>

// ── PIN MODAL ─────────────────────────────────────────────────────────────────
function PinModal({pin,repairList,onSave,onTrash,onClose,onAddRT}){
  const isNew=!pin.repairName;
  const [view,setView]=useState(isNew?(repairList.length>0?'choose':'new'):'status');
  const [selR,setSelR]=useState(repairList.find(r=>r.name===pin.repairName)||null);
  const [newName,setNewName]=useState('');
  const [rtype,setRtype]=useState('linear');

  // All measurement / comment / staging state lives here, never inside sub-components
  const [meas,setMeas]=useState(()=>({...(pin.measurements||{})}));
  const [comment,setComment]=useState('');
  const [hazard,setHazard]=useState(pin.hazard||'yellow');
  const [staging,setStaging]=useState([]);
  const [saving,setSaving]=useState(false);
  const [photoNav,setPhotoNav]=useState(null);

  // Track if meas changed vs original pin (used only in fixing/done views)
  const [origMeas,setOrigMeas]=useState(null); // set when entering fixing/done

  const MIN=1;const MAX=3;
  const ert=selR?selR.type:rtype;
  const rt=RT.find(r=>r.id===ert);

  const surveyPhotos=pin.surveyPhotos||[];
  const fixingPhotos=pin.fixingPhotos||[];
  const donePhotos=pin.donePhotos||[];
  const allPhotos=[...surveyPhotos,...fixingPhotos,...donePhotos];
  const cur=pin.status||ST.TOREPAIR;

  const measChanged=origMeas!==null&&Object.keys({...origMeas,...meas}).some(k=>(origMeas[k]||'').toString()!==(meas[k]||'').toString());
  const canSave=staging.length>=MIN;
  const commentOk=!measChanged||comment.trim().length>=10;

  const enterFixing=()=>{setMeas({...(pin.measurements||{})});setOrigMeas({...(pin.measurements||{})});setComment('');setStaging([]);setView('fixing');};
  const enterDone=()=>{setMeas({...(pin.measurements||{})});setOrigMeas({...(pin.measurements||{})});setComment('');setStaging([]);setView('done');};

  const addPhotos=files=>{
    const rem=MAX-staging.length;
    Array.from(files).slice(0,rem).forEach(f=>{
      const fr=new FileReader();
      fr.onload=ev=>setStaging(p=>[...p,ev.target.result]);
      fr.readAsDataURL(f);
    });
  };

  const pickR=r=>{setSelR(r);setRtype(r.type);setMeas({});setView('fill');};

  const saveSurvey=async()=>{
    if(!canSave){alert('At least 1 photo required.');return;}
    if(hazard==='red'&&comment.trim().length<5){alert('Hazard level requires a comment (min 5 characters).');return;}
    setSaving(true);
    const rn=selR?selR.name:newName;
    if(!selR)onAddRT({name:rn,type:ert});
    const pinData={...pin,repairName:rn,repairType:ert,measurements:{...meas}};
    const tagged=await Promise.all(staging.map(p=>wm(p,pinData)));
    onSave({...pinData,comment,hazard,status:ST.TOREPAIR,surveyPhotos:tagged,fixingPhotos:[],donePhotos:[]});
    setSaving(false);
  };

  const savePhase=async(type)=>{
    if(!canSave){alert('At least 1 photo required.');return;}
    if(!commentOk){alert('Measurement changed — please add a comment of at least 10 characters.');return;}
    setSaving(true);
    const pinForWm={...pin,measurements:{...meas}};
    const tagged=await Promise.all(staging.map(p=>wm(p,pinForWm)));
    let updated={...pin,measurements:{...meas}};
    if(type==='fixing'){
      updated.fixingPhotos=tagged;
      updated.status=ST.FIXING;
      if(comment.trim())updated.fixingComment=comment.trim();
    }else{
      updated.donePhotos=tagged;
      updated.status=ST.DONE;
      if(comment.trim())updated.doneComment=comment.trim();
    }
    onSave(updated);setSaving(false);
  };

  // Staging area — renders current staging state, no internal state
  const StagingArea=({label})=>(
    <div style={{marginBottom:12}}>
      {staging.length>0&&(
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          {staging.map((p,i)=>(
            <div key={i} style={{position:'relative',width:60,height:48,borderRadius:6,overflow:'hidden',border:'1px solid '+C.border}}>
              <img src={p} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
              <button onClick={()=>setStaging(s=>s.filter((_,j)=>j!==i))} style={{position:'absolute',top:1,right:1,background:'rgba(220,38,38,0.85)',border:'none',borderRadius:'50%',color:'#fff',width:16,height:16,cursor:'pointer',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
            </div>
          ))}
        </div>
      )}
      {staging.length<MAX&&(
        <label style={{display:'block',padding:'11px',border:'1px dashed '+C.borderDark,borderRadius:8,textAlign:'center',color:C.textDim,fontSize:12,cursor:'pointer',background:C.surface}}>
          📷 {label} ({staging.length}/{MAX})
          <input type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={e=>addPhotos(e.target.files)}/>
        </label>
      )}
      {staging.length>=MIN&&<div style={{fontSize:10,color:C.done,marginTop:4,textAlign:'center'}}>✓ Ready</div>}
    </div>
  );

  const statusColor=SC[cur]||C.blue;
  const hbc=HC[hazard]||C.border;

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:'1px solid '+(isNew?C.border:hbc+'55'),borderRadius:14,width:390,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>

        {/* Header */}
        <div style={{padding:'13px 17px',display:'flex',justifyContent:'space-between',alignItems:'center',background:C.navyDark,borderRadius:'14px 14px 0 0'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{background:pCol(pin),borderRadius:'50%',width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',fontFamily:'DM Mono'}}>{pin.id}</div>
            <span style={{fontSize:14,fontWeight:700,color:'#fff',fontFamily:'Barlow Condensed',letterSpacing:0.5}}>PIN #{pin.id}</span>
            {!isNew&&<span style={{fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:10,background:statusColor+'33',color:statusColor,letterSpacing:1,border:'1px solid '+statusColor+'55'}}>{SL[cur]}</span>}
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {!isNew&&<button onClick={()=>onTrash(pin.id)} style={{background:'none',border:'1px solid #ef444430',borderRadius:6,color:'#ef444488',cursor:'pointer',fontSize:11,padding:'3px 8px'}}>🗑</button>}
            <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',fontSize:20,cursor:'pointer'}}>×</button>
          </div>
        </div>

        <div style={{padding:'16px 17px'}}>

          {/* ── STATUS VIEW ──────────────────────────────────────────────── */}
          {view==='status'&&(
            <>
              <div style={{padding:'10px 14px',background:C.surface,borderRadius:8,border:'1px solid '+C.border,marginBottom:14}}>
                <div style={{fontSize:14,fontWeight:700,color:C.navyDark,marginBottom:3,fontFamily:'Barlow Condensed'}}>{pin.repairName}</div>
                <div style={{fontSize:11,color:C.textDim,fontFamily:'DM Mono'}}>{getMeas(pin)}</div>
                {pin.hazard&&<div style={{fontSize:10,color:HC[pin.hazard],marginTop:4,fontWeight:700}}>{(HAZARDS.find(h=>h.id===pin.hazard)||{label:''}).label}</div>}
                {pin.comment&&<div style={{fontSize:11,color:C.textDim,marginTop:5,fontStyle:'italic',borderTop:'1px solid '+C.border,paddingTop:5}}>"{pin.comment}"</div>}
                {pin.fixingComment&&<div style={{fontSize:10,color:'#7c3aed',marginTop:3,fontStyle:'italic'}}>📐 "{pin.fixingComment}"</div>}
              </div>

              {/* Progress track */}
              <div style={{display:'flex',gap:4,marginBottom:14}}>
                {[ST.TOREPAIR,ST.FIXING,ST.DONE].map((s,i)=>{
                  const order=[ST.TOREPAIR,ST.FIXING,ST.DONE];
                  const reached=order.indexOf(cur)>=order.indexOf(s);
                  return(
                    <div key={s} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                      <div style={{height:4,width:'100%',borderRadius:2,background:reached?SC[s]:C.border}}/>
                      <span style={{fontSize:8,color:reached?SC[s]:C.textMuted,fontFamily:'Barlow Condensed',fontWeight:reached?700:400}}>{SL[s].toUpperCase()}</span>
                    </div>
                  );
                })}
              </div>

              {allPhotos.length>0&&(
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:9,color:C.textMuted,marginBottom:6,letterSpacing:1.5,fontFamily:'Barlow Condensed',fontWeight:700}}>PHOTOS ({allPhotos.length})</div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    {allPhotos.map((p,i)=>(
                      <div key={i} onClick={()=>setPhotoNav({photos:allPhotos,startIdx:i})} style={{width:52,height:40,borderRadius:5,overflow:'hidden',border:'1px solid '+C.border,cursor:'pointer'}}>
                        <img src={p} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {cur===ST.TOREPAIR&&(
                <button onClick={enterFixing} style={{width:'100%',padding:'10px',background:'#8b5cf614',border:'1px solid #8b5cf6',borderRadius:8,color:'#7c3aed',fontWeight:700,fontSize:13,cursor:'pointer',marginBottom:6,fontFamily:'Barlow Condensed'}}>
                  📸 Add Fixing Photos →
                </button>
              )}
              {cur===ST.FIXING&&(
                <button onClick={enterDone} style={{width:'100%',padding:'10px',background:'#22c55e14',border:'1px solid #22c55e',borderRadius:8,color:'#16a34a',fontWeight:700,fontSize:13,cursor:'pointer',marginBottom:6,fontFamily:'Barlow Condensed'}}>
                  ✓ Add Done Photos →
                </button>
              )}
              {cur===ST.DONE&&(
                <div style={{textAlign:'center',padding:'10px',background:'#22c55e10',border:'1px solid #22c55e33',borderRadius:8,color:'#16a34a',fontSize:13,fontWeight:700,marginBottom:6,fontFamily:'Barlow Condensed'}}>✓ COMPLETE</div>
              )}
            </>
          )}

          {/* ── CHOOSE REPAIR ─────────────────────────────────────────── */}
          {view==='choose'&&(
            <>
              <div style={{display:'flex',gap:6,marginBottom:12}}>
                <button style={{flex:1,padding:'7px',borderRadius:6,border:'1px solid '+C.blue,background:C.blueDim,color:C.blue,fontSize:12,cursor:'pointer',fontWeight:600}}>Repairs ({repairList.length})</button>
                <button onClick={()=>setView('new')} style={{flex:1,padding:'7px',borderRadius:6,border:'1px solid '+C.border,background:'transparent',color:C.textDim,fontSize:12,cursor:'pointer'}}>+ New</button>
              </div>
              {repairList.map((r,i)=>(
                <div key={i} onClick={()=>pickR(r)} style={{padding:'10px 12px',borderRadius:7,border:'1px solid '+C.border,background:C.surface,marginBottom:6,cursor:'pointer',transition:'border-color 0.1s'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=C.blue} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                  <div style={{fontSize:13,color:C.navyDark,fontWeight:600,fontFamily:'Barlow Condensed'}}>{r.name}</div>
                  <div style={{fontSize:10,color:C.textMuted,fontFamily:'DM Mono',marginTop:2}}>{(RT.find(t=>t.id===r.type)||{label:''}).label}</div>
                </div>
              ))}
            </>
          )}

          {/* ── NEW REPAIR ────────────────────────────────────────────── */}
          {view==='new'&&(
            <>
              <div style={{display:'flex',gap:6,marginBottom:12}}>
                {repairList.length>0&&<button onClick={()=>setView('choose')} style={{flex:1,padding:'7px',borderRadius:6,border:'1px solid '+C.border,background:'transparent',color:C.textDim,fontSize:12,cursor:'pointer'}}>← Repairs</button>}
                <button style={{flex:repairList.length>0?1:2,padding:'7px',borderRadius:6,border:'1px solid '+C.blue,background:C.blueDim,color:C.blue,fontSize:12,cursor:'pointer',fontWeight:600}}>+ New repair</button>
              </div>
              <label style={LS}>REPAIR NAME</label>
              <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Spalling, Joint, Crack..." style={{...IS,marginBottom:14}}/>
              <label style={LS}>REPAIR TYPE</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:16}}>
                {RT.map(t=>(
                  <button key={t.id} onClick={()=>setRtype(t.id)}
                    style={{padding:'8px',borderRadius:6,border:'1.5px solid '+(rtype===t.id?C.blue:C.border),background:rtype===t.id?C.blueDim:C.card,color:rtype===t.id?C.blue:C.textDim,fontSize:12,fontWeight:rtype===t.id?700:400,cursor:'pointer',textAlign:'left',fontFamily:'Barlow Condensed'}}>
                    {t.label}
                  </button>
                ))}
              </div>
              <button disabled={!newName.trim()} onClick={()=>setView('fill')}
                style={{width:'100%',padding:'9px',background:newName.trim()?C.navyDark:'#e5e7eb',border:'none',borderRadius:8,color:newName.trim()?'#fff':'#9ca3af',fontSize:13,fontWeight:700,cursor:newName.trim()?'pointer':'default',fontFamily:'Barlow Condensed'}}>
                CONTINUE →
              </button>
            </>
          )}

          {/* ── FILL — initial survey ─────────────────────────────────── */}
          {view==='fill'&&(
            <>
              <div style={{padding:'8px 12px',background:C.surface,borderRadius:7,border:'1px solid '+C.border,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                <span style={{fontSize:13,color:C.navyDark,fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'Barlow Condensed'}}>{selR?selR.name:newName}</span>
                <span style={{fontSize:10,color:C.textMuted,fontFamily:'DM Mono',flexShrink:0}}>{(RT.find(t=>t.id===ert)||{label:''}).label}</span>
                <button onClick={()=>{setView(repairList.length>0?'choose':'new');setSelR(null);}} style={{background:'none',border:'none',color:C.textMuted,fontSize:12,cursor:'pointer',flexShrink:0}}>✎</button>
              </div>

              {rt&&(
                <>
                  <label style={LS}>MEASUREMENTS</label>
                  <div style={{display:'grid',gridTemplateColumns:rt.fields.length===3?'1fr 1fr 1fr':'1fr 1fr',gap:6,marginBottom:6}}>
                    {rt.fields.map(f=>(
                      <div key={f.k}>
                        <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>{f.l}</div>
                        <input
                          type="number" min="0"
                          value={meas[f.k]||''}
                          onChange={e=>{const v=e.target.value;setMeas(prev=>({...prev,[f.k]:v}));}}
                          placeholder="0"
                          style={{...IS,padding:'7px 8px'}}
                        />
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:12,color:C.blue,marginBottom:14,fontFamily:'DM Mono',padding:'5px 10px',background:C.blueDim,borderRadius:6,border:'1px solid '+C.blueBorder}}>= {rt.calc(meas)}</div>
                </>
              )}

              <label style={LS}>COMMENT (optional)</label>
              <textarea
                value={comment}
                onChange={e=>setComment(e.target.value)}
                placeholder="Location, observations..."
                rows={2}
                style={{...IS,resize:'none',marginBottom:14}}
              />

              <label style={LS}>HAZARD LEVEL</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5,marginBottom:14}}>
                {HAZARDS.map(h=>(
                  <button key={h.id} onClick={()=>setHazard(h.id)}
                    style={{padding:'7px 4px',borderRadius:6,border:'1.5px solid '+(hazard===h.id?h.color:C.border),background:hazard===h.id?h.color+'15':C.card,color:hazard===h.id?h.color:C.textDim,fontSize:10,fontWeight:hazard===h.id?700:400,cursor:'pointer',textAlign:'center'}}>
                    ● {h.label}
                  </button>
                ))}
              </div>

              <label style={LS}>PHOTOS (1–3)</label>
              <StagingArea label="Add survey photos"/>

              <button onClick={saveSurvey} disabled={saving||!canSave}
                style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:canSave?C.navyDark:'#e5e7eb',color:canSave?'#fff':'#9ca3af',fontWeight:700,fontSize:13,cursor:canSave?'pointer':'default',opacity:saving?0.6:1,fontFamily:'Barlow Condensed'}}>
                {saving?'SAVING...':'SAVE PIN →'}
              </button>
            </>
          )}

          {/* ── FIXING ───────────────────────────────────────────────── */}
          {view==='fixing'&&(
            <>
              <div style={{padding:'10px 14px',background:'#8b5cf610',borderRadius:8,border:'1px solid #8b5cf633',marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:700,color:'#7c3aed',fontFamily:'Barlow Condensed'}}>FIXING PHOTOS</div>
                <div style={{fontSize:11,color:'#7c3aed99',marginTop:2}}>1–3 photos · you can update the measurement if needed</div>
              </div>

              {rt&&(
                <>
                  <label style={{...LS,color:measChanged?'#ea580c':C.textDim}}>
                    MEASUREMENTS {measChanged&&<span style={{color:'#ea580c',fontWeight:700}}>● CHANGED</span>}
                  </label>
                  <div style={{display:'grid',gridTemplateColumns:rt.fields.length===3?'1fr 1fr 1fr':'1fr 1fr',gap:6,marginBottom:6}}>
                    {rt.fields.map(f=>(
                      <div key={f.k}>
                        <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>{f.l}</div>
                        <input
                          type="number" min="0"
                          value={meas[f.k]||''}
                          onChange={e=>{const v=e.target.value;setMeas(prev=>({...prev,[f.k]:v}));}}
                          placeholder="0"
                          style={{...IS,padding:'7px 8px',borderColor:measChanged?'#8b5cf6':C.border}}
                        />
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:12,color:C.blue,marginBottom:12,fontFamily:'DM Mono',padding:'5px 10px',background:C.blueDim,borderRadius:6,border:'1px solid '+C.blueBorder}}>= {rt.calc(meas)}</div>
                </>
              )}

              <label style={{...LS,color:measChanged&&comment.trim().length<10?'#dc2626':C.textDim}}>
                COMMENT {measChanged?<span style={{color:'#dc2626'}}>* required — measurement changed (min 10 chars)</span>:'(optional)'}
              </label>
              <textarea
                value={comment}
                onChange={e=>setComment(e.target.value)}
                placeholder={measChanged?'Explain why the measurement changed...':'Notes for this phase...'}
                rows={2}
                style={{...IS,resize:'none',marginBottom:4,borderColor:measChanged&&comment.trim().length<10?'#dc2626':C.border}}
              />
              {measChanged&&comment.trim().length>0&&comment.trim().length<10&&(
                <div style={{fontSize:10,color:'#dc2626',marginBottom:6}}>{10-comment.trim().length} more characters needed</div>
              )}
              <div style={{marginBottom:10}}/>

              <label style={LS}>FIXING PHOTOS (1–3)</label>
              <StagingArea label="Add fixing photos"/>

              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button onClick={()=>setView('status')} style={{flex:1,padding:'9px',background:'transparent',border:'1px solid '+C.border,borderRadius:8,color:C.textDim,fontSize:13,cursor:'pointer'}}>← Back</button>
                <button onClick={()=>savePhase('fixing')} disabled={saving||!canSave||!commentOk}
                  style={{flex:2,padding:'10px',borderRadius:8,border:'none',background:(canSave&&commentOk)?'#7c3aed':'#e5e7eb',color:(canSave&&commentOk)?'#fff':'#9ca3af',fontWeight:700,fontSize:13,cursor:'pointer',opacity:saving?0.6:1,fontFamily:'Barlow Condensed'}}>
                  {saving?'SAVING...':'SAVE FIXING →'}
                </button>
              </div>
            </>
          )}

          {/* ── DONE ─────────────────────────────────────────────────── */}
          {view==='done'&&(
            <>
              <div style={{padding:'10px 14px',background:'#22c55e10',borderRadius:8,border:'1px solid #22c55e33',marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:700,color:'#16a34a',fontFamily:'Barlow Condensed'}}>DONE PHOTOS</div>
                <div style={{fontSize:11,color:'#16a34a99',marginTop:2}}>1–3 photos · document the completed repair</div>
              </div>

              {rt&&(
                <>
                  <label style={{...LS,color:measChanged?'#ea580c':C.textDim}}>
                    MEASUREMENTS {measChanged&&<span style={{color:'#ea580c',fontWeight:700}}>● CHANGED</span>}
                  </label>
                  <div style={{display:'grid',gridTemplateColumns:rt.fields.length===3?'1fr 1fr 1fr':'1fr 1fr',gap:6,marginBottom:6}}>
                    {rt.fields.map(f=>(
                      <div key={f.k}>
                        <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>{f.l}</div>
                        <input
                          type="number" min="0"
                          value={meas[f.k]||''}
                          onChange={e=>{const v=e.target.value;setMeas(prev=>({...prev,[f.k]:v}));}}
                          placeholder="0"
                          style={{...IS,padding:'7px 8px',borderColor:measChanged?'#22c55e':C.border}}
                        />
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:12,color:C.blue,marginBottom:12,fontFamily:'DM Mono',padding:'5px 10px',background:C.blueDim,borderRadius:6,border:'1px solid '+C.blueBorder}}>= {rt.calc(meas)}</div>
                </>
              )}

              <label style={{...LS,color:measChanged&&comment.trim().length<10?'#dc2626':C.textDim}}>
                COMMENT {measChanged?<span style={{color:'#dc2626'}}>* required — measurement changed (min 10 chars)</span>:'(optional)'}
              </label>
              <textarea
                value={comment}
                onChange={e=>setComment(e.target.value)}
                placeholder={measChanged?'Explain why the measurement changed...':'Final notes...'}
                rows={2}
                style={{...IS,resize:'none',marginBottom:4,borderColor:measChanged&&comment.trim().length<10?'#dc2626':C.border}}
              />
              {measChanged&&comment.trim().length>0&&comment.trim().length<10&&(
                <div style={{fontSize:10,color:'#dc2626',marginBottom:6}}>{10-comment.trim().length} more characters needed</div>
              )}
              <div style={{marginBottom:10}}/>

              <label style={LS}>DONE PHOTOS (1–3)</label>
              <StagingArea label="Add done photos"/>

              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button onClick={()=>setView('status')} style={{flex:1,padding:'9px',background:'transparent',border:'1px solid '+C.border,borderRadius:8,color:C.textDim,fontSize:13,cursor:'pointer'}}>← Back</button>
                <button onClick={()=>savePhase('done')} disabled={saving||!canSave||!commentOk}
                  style={{flex:2,padding:'10px',borderRadius:8,border:'none',background:(canSave&&commentOk)?'#16a34a':'#e5e7eb',color:(canSave&&commentOk)?'#fff':'#9ca3af',fontWeight:700,fontSize:13,cursor:'pointer',opacity:saving?0.6:1,fontFamily:'Barlow Condensed'}}>
                  {saving?'SAVING...':'MARK DONE ✓'}
                </button>
              </div>
            </>
          )}

        </div>
      </div>
      {photoNav&&<PhotoNav photos={photoNav.photos} initIdx={photoNav.startIdx} onClose={()=>setPhotoNav(null)}/>}
    </div>
  );
}

// ── TRASH PANEL ───────────────────────────────────────────────────────────────
function TrashPanel({project,onRestore,onClose}){
  const trashed=project.elevations.flatMap((e,ei)=>(e.trash||[]).map(p=>({...p,_elev:e.name,_elevIdx:ei})));
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:250,padding:20}}>
      <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,width:460,maxWidth:'95vw',maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.15)'}}>
        <div style={{padding:'15px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',background:C.navyDark,borderRadius:'14px 14px 0 0'}}>
          <div style={{fontFamily:'Barlow Condensed',fontSize:16,fontWeight:700,color:'#fff'}}>🗑 TRASH</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',fontSize:20,cursor:'pointer'}}>×</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'12px 20px',background:C.surface}}>
          {trashed.length===0
            ?<div style={{textAlign:'center',color:C.textMuted,fontSize:13,padding:'32px'}}>Trash is empty</div>
            :trashed.map((p,i)=>(
              <div key={i} style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                    <div style={{background:pCol(p),borderRadius:'50%',width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',fontFamily:'DM Mono'}}>{p.id}</div>
                    <span style={{fontSize:13,fontWeight:600,color:C.navyDark,fontFamily:'Barlow Condensed'}}>{p.repairName||'Unnamed'}</span>
                  </div>
                  <div style={{fontSize:10,color:C.textMuted,paddingLeft:27}}>{p._elev} · {getMeas(p)} · {fmtDate(p.deletedAt)}</div>
                </div>
                <button onClick={()=>onRestore(p._elevIdx,p.id)} style={{background:C.blueDim,border:'1px solid '+C.blueBorder,borderRadius:7,color:C.blue,fontSize:11,fontWeight:700,padding:'5px 12px',cursor:'pointer',flexShrink:0,fontFamily:'Barlow Condensed'}}>RESTORE</button>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}


// ── COMMENT CELL — expandable notes per stage ─────────────────────────────────
function CommentCell({pin}){
  const [open,setOpen]=useState(false);
  const stages=[
    {key:'comment',     label:'To Repair', color:'#3b82f6', bg:'#3b82f610', val:pin.comment},
    {key:'fixingComment',label:'Fixing',   color:'#8b5cf6', bg:'#8b5cf610', val:pin.fixingComment},
    {key:'doneComment', label:'Done',      color:'#22c55e', bg:'#22c55e10', val:pin.doneComment},
    {key:'hazard',      label:'Hazard',    color:HC[pin.hazard]||'#6b7280', bg:(HC[pin.hazard]||'#6b7280')+'15',
      val:pin.hazard?(HAZARDS.find(h=>h.id===pin.hazard)||{label:''}).label+( pin.comment?' — '+pin.comment:''):null},
  ];
  const active=stages.filter(s=>s.val&&s.val.trim());
  if(!active.length)return<span style={{color:'#9ca3af',fontSize:11}}>—</span>;
  return(
    <div style={{position:'relative'}}>
      <div style={{display:'flex',flexWrap:'wrap',gap:3,cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
        {active.map(s=>(
          <span key={s.key} style={{fontSize:9,fontWeight:700,color:s.color,background:s.bg,padding:'2px 6px',borderRadius:4,fontFamily:'Barlow Condensed',letterSpacing:0.3,border:'1px solid '+s.color+'33',whiteSpace:'nowrap'}}>
            {s.label}
          </span>
        ))}
        <span style={{fontSize:9,color:'#9ca3af',alignSelf:'center'}}>{open?'▲':'▼'}</span>
      </div>
      {open&&(
        <div style={{position:'absolute',top:'100%',left:0,zIndex:50,marginTop:4,background:'#ffffff',border:'1px solid #e5e7eb',borderRadius:8,padding:'10px 12px',minWidth:220,maxWidth:300,boxShadow:'0 8px 24px rgba(0,0,0,0.12)'}}>
          {active.map(s=>(
            <div key={s.key} style={{marginBottom:s===active[active.length-1]?0:8}}>
              <div style={{fontSize:9,fontWeight:700,color:s.color,marginBottom:3,fontFamily:'Barlow Condensed',letterSpacing:0.5}}>{s.label.toUpperCase()}</div>
              <div style={{fontSize:11,color:'#374151',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{s.val}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SUMMARY TABLE ─────────────────────────────────────────────────────────────

  const savePrice=async(name,val)=>{const np={...prices,[name]:val};setPrices(np);await dbSavePrices(project.id,np);};

  const allPins=project.elevations.flatMap(e=>(e.pins||[]).map(p=>({...p,_elev:e.name})));
  const types=[...new Set(allPins.map(p=>p.repairType))].filter(Boolean);
  const filtered=filter==='all'?allPins:allPins.filter(p=>p.repairType===filter);

  const totalsMap={};
  filtered.forEach(pin=>{
    const r=RT.find(r=>r.id===pin.repairType);if(!r)return;
    const key=pin.repairName+'__'+pin.repairType;

  });

  const grandTotal=Object.entries(totalsMap).reduce((s,[,v])=>{
    const q=v.vals.reduce((a,b)=>a+b,0);

    return s+q*p;
  },0);

  const TH={padding:'9px 12px',textAlign:'left',fontSize:10,fontWeight:700,color:'#94a3b8',borderBottom:'1px solid rgba(255,255,255,0.08)',whiteSpace:'nowrap',letterSpacing:1,fontFamily:'Barlow Condensed'};

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:250,padding:16}}>

        <div style={{padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,background:C.navyDark,borderRadius:'14px 14px 0 0'}}>
          <div>
            <div style={{fontFamily:'Barlow Condensed',fontSize:20,fontWeight:800,color:'#fff'}}>{project.name}</div>
            <div style={{fontSize:11,color:'#475569',marginTop:2}}>Quick Survey · {new Date().toLocaleDateString('en-NZ')} · {USER}</div>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            {grandTotal>0&&(
              <div style={{padding:'6px 14px',background:'rgba(37,99,235,0.2)',border:'1px solid rgba(37,99,235,0.4)',borderRadius:8}}>
                <div style={{fontSize:9,color:'#93c5fd',letterSpacing:1.5,fontFamily:'Barlow Condensed',fontWeight:700}}>TOTAL ESTIMATE</div>
                <div style={{fontSize:20,fontWeight:800,color:'#fff',fontFamily:'Barlow Condensed'}}>$ {grandTotal.toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              </div>
            )}
            <select value={filter} onChange={e=>setFilter(e.target.value)} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',borderRadius:7,padding:'6px 10px',color:'#fff',fontSize:12,outline:'none',cursor:'pointer'}}>
              <option value="all" style={{background:'#111'}}>All types</option>
              {types.map(t=><option key={t} value={t} style={{background:'#111'}}>{(RT.find(r=>r.id===t)||{label:t}).label}</option>)}
            </select>
            <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',fontSize:22,cursor:'pointer'}}>×</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'16px 20px',background:C.bg}}>
          {project.elevations.map((el,ei)=>{
            const ePins=filtered.filter(p=>p._elev===el.name);
            if(!ePins.length)return null;
            return(
              <div key={ei} style={{marginBottom:24}}>
                <div style={{fontSize:12,fontWeight:700,color:C.navyDark,marginBottom:8,display:'flex',alignItems:'center',gap:8,fontFamily:'Barlow Condensed'}}>
                  <span style={{fontSize:9,color:C.blue,background:C.blueDim,padding:'2px 8px',borderRadius:4,letterSpacing:1,border:'1px solid '+C.blueBorder}}>ELEVATION</span>
                  {el.name}
                  <span style={{fontSize:10,color:C.textMuted,fontFamily:'DM Mono'}}>{ePins.length} pin{ePins.length!==1?'s':''}</span>
                </div>
                <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
                  <table style={{width:'100%',borderCollapse:'collapse'}}>
                    <thead><tr style={{background:C.navyDark}}>{['ID','Repair','Type','Measurement','Status','Hazard Level','Photos','Notes'].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                    <tbody>
                      {ePins.map(pin=>{
                        const allP=[...(pin.surveyPhotos||[]),...(pin.fixingPhotos||[]),...(pin.donePhotos||[])];
                        const sc=SC[pin.status]||C.textMuted;
                        return(
                          <tr key={pin.id}>
                            <td style={TD}><div style={{background:pCol(pin),borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#fff',fontFamily:'DM Mono'}}>{pin.id}</div></td>

                            <td style={TD}><span style={{fontSize:10,fontWeight:700,color:sc,background:sc+'18',padding:'2px 8px',borderRadius:8,fontFamily:'Barlow Condensed'}}>{SL[pin.status]||'—'}</span></td>
                            <td style={TD}>{pin.hazard?<span style={{fontSize:10,fontWeight:700,color:HC[pin.hazard],background:HC[pin.hazard]+'18',padding:'2px 6px',borderRadius:6}}>{(HAZARDS.find(h=>h.id===pin.hazard)||{label:''}).label}</span>:<span style={{color:C.textMuted}}>—</span>}</td>
                            <td style={TD}>{allP.length>0?(
                              <div style={{display:'flex',alignItems:'center',gap:4}}>
                                <div onClick={()=>setPhotoNav({photos:allP,startIdx:0})} style={{width:40,height:30,borderRadius:4,overflow:'hidden',cursor:'pointer',border:'1px solid '+C.border,flexShrink:0}}>
                                  <img src={allP[0]} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>

                                {allP.length>1&&<span onClick={()=>setPhotoNav({photos:allP,startIdx:0})} style={{fontSize:10,color:C.blue,cursor:'pointer'}}>+{allP.length-1}</span>}
                              </div>
                            ):<span style={{color:C.textMuted,fontSize:11}}>—</span>}</td>
                            <td style={{...TD,maxWidth:180,minWidth:120}}>
                              <CommentCell pin={pin}/>

                </div>
              </div>
            );
          })}
          {Object.keys(totalsMap).length>0&&(
            <div style={{padding:'16px',background:C.card,border:'1px solid '+C.border,borderRadius:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
              <div style={{fontSize:10,color:C.textDim,letterSpacing:1.5,marginBottom:12,fontFamily:'Barlow Condensed',fontWeight:700}}>QUANTITIES & PRICING</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
                {Object.entries(totalsMap).map(([k,v])=>{
                  const qty=v.vals.reduce((a,b)=>a+b,0);
                  const price=parseFloat(prices[v.repairName]||'');
                  const subtotal=isNaN(price)?0:qty*price;
                  return(
                    <div key={k} style={{background:C.surface,borderRadius:9,padding:'12px 14px',border:'1px solid '+C.border}}>
                      <div style={{fontSize:13,color:C.navyDark,fontWeight:700,fontFamily:'Barlow Condensed',marginBottom:1}}>{v.repairName}</div>
                      <div style={{fontSize:9,color:C.textMuted,fontFamily:'DM Mono',marginBottom:8}}>{v.typeLabel} · {v.count} item{v.count!==1?'s':''}</div>
                      <div style={{fontSize:20,fontWeight:800,color:C.blue,fontFamily:'Barlow Condensed',marginBottom:8}}>{qty>0?qty.toFixed(3):0} <span style={{fontSize:10,color:C.textMuted}}>{v.unit}</span></div>
                      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                        <span style={{fontSize:11,color:C.textDim}}>$</span>
                        <input type="number" min="0" step="0.01" placeholder="Price / unit" value={prices[v.repairName]||''}
                          onChange={e=>savePrice(v.repairName,e.target.value)}
                          style={{flex:1,background:C.card,border:'1px solid '+C.borderDark,borderRadius:5,padding:'5px 7px',color:C.navyDark,fontSize:12,outline:'none',fontFamily:'DM Mono'}}/>

                      {subtotal>0&&<div style={{fontSize:14,fontWeight:700,color:C.navyDark,fontFamily:'Barlow Condensed',marginTop:6,paddingTop:6,borderTop:'1px solid '+C.border}}>= $ {subtotal.toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>}
                    </div>
                  );
                })}
              </div>
              {grandTotal>0&&(
                <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid '+C.border,display:'flex',justifyContent:'flex-end',alignItems:'center',gap:16}}>
                  <div style={{fontSize:12,color:C.textDim}}>Grand total estimate</div>
                  <div style={{fontFamily:'Barlow Condensed',fontSize:30,fontWeight:800,color:C.navyDark}}>$ {grandTotal.toLocaleString('en-NZ',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>

              )}
            </div>
          )}
          {!filtered.length&&<div style={{textAlign:'center',color:C.textMuted,fontSize:13,padding:'40px'}}>No pins to show</div>}
        </div>
      </div>
      {photoNav&&<PhotoNav photos={photoNav.photos} initIdx={photoNav.startIdx} onClose={()=>setPhotoNav(null)}/>}
    </div>
  );
}

// ── PIN MARKER ────────────────────────────────────────────────────────────────
function Marker({pin,selected,isMoving,isDeleting,onClick,x,y}){
  const headColor=pCol(pin);
  const stemColor=SC[pin.status]||'#6b7280';
  const sz=isMoving||selected||isDeleting?28:22;
  return(
    <div onClick={e=>{e.stopPropagation();onClick(pin.id);}} style={{position:'absolute',left:x,top:y,transform:'translate(-50%,-100%)',cursor:isDeleting?'not-allowed':'pointer',zIndex:10,userSelect:'none'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div style={{background:isDeleting?'#dc2626':isMoving?'#ea580c':selected?'#fff':headColor,color:isDeleting||isMoving?'#fff':selected?headColor:'#fff',border:'2px solid '+(isDeleting?'#dc2626':isMoving?'#ea580c':headColor),borderRadius:'50%',width:sz,height:sz,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,fontFamily:'DM Mono',boxShadow:selected?'0 0 0 3px '+headColor+'44,0 2px 10px rgba(0,0,0,0.35)':'0 2px 8px rgba(0,0,0,0.35)',transition:'all 0.15s'}}>{isDeleting?'✕':pin.id}</div>
        <div style={{width:2,height:10,background:stemColor,opacity:0.95}}/>
        <div style={{width:7,height:7,borderRadius:'50%',background:stemColor,boxShadow:'0 1px 4px '+stemColor+'88'}}/>
      </div>
    </div>
  );
}

function Toast({msg}){
  return<div style={{position:'fixed',bottom:60,left:'50%',transform:'translateX(-50%)',background:C.navyDark,border:'1px solid #1e3a5f',borderRadius:20,padding:'8px 20px',fontSize:12,color:'#e2e8f0',zIndex:500,pointerEvents:'none',boxShadow:'0 4px 20px rgba(0,0,0,0.2)'}}>{msg}</div>;
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('home');
  const [project,setProject]=useState(null);
  const [rl,setRl]=useState([]);
  const [ae,setAe]=useState(0);
  const [mode,setMode]=useState('pan');
  const [movId,setMovId]=useState(null);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [drag,setDrag]=useState(false);
  const [ds,setDs]=useState(null);
  const [selPin,setSelPin]=useState(null);
  const [modal,setModal]=useState(null);
  const [nid,setNid]=useState(1);
  const [csz,setCsz]=useState({w:800,h:600});
  const [showT,setShowT]=useState(false);
  const [showTrash,setShowTrash]=useState(false);
  const [toast,setToast]=useState(null);
  const cRef=useRef(null);
  const iRef=useRef(null);

  useEffect(()=>{const obs=new ResizeObserver(entries=>{for(const e of entries)setCsz({w:e.contentRect.width,h:e.contentRect.height});});if(cRef.current)obs.observe(cRef.current);return()=>obs.disconnect();},[]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2200);};
  const persist=async p=>{await dbPut(p);};
  const openProject=p=>{setProject(p);setRl(p.repairList||[]);const maxId=p.elevations.flatMap(e=>[...(e.pins||[]),...(e.trash||[])]).reduce((m,pi)=>Math.max(m,pi.id),0);setNid(maxId+1);setAe(0);setMode('pan');setScreen('survey');};
  const createProject=(name,names)=>{const p={id:Date.now().toString(),name,createdAt:new Date().toISOString(),user:USER,repairList:[],elevations:names.map(n=>({name:n,img:null,pins:[],trash:[]}))};persist(p);openProject(p);};

  const el=project?.elevations[ae];
  const upd=(i,fn)=>{setProject(p=>{const e=[...p.elevations];e[i]=fn(e[i]);const np={...p,elevations:e};persist(np);return np;});};
  const onPhoto=e=>{
    const f=e.target.files[0];if(!f)return;
    const fr=new FileReader();
    fr.onload=async ev=>{
      const b64=await compress(ev.target.result,1600,0.7);
      upd(ae,el=>({...el,img:b64}));setZoom(1);setPan({x:0,y:0});
    };
    fr.readAsDataURL(f);
  };
  const onWheel=e=>{e.preventDefault();setZoom(z=>Math.min(8,Math.max(0.3,z*(e.deltaY>0?0.85:1.18))));};
  const imgC=e=>{const img=iRef.current;if(!img)return null;const r=img.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*100,y=(e.clientY-r.top)/r.height*100;if(x<0||x>100||y<0||y>100)return null;return{x,y};};
  const cntC=e=>{const c=cRef.current;if(!c)return null;const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*100,y:(e.clientY-r.top)/r.height*100};};
  const onMD=e=>{if(mode==='pan'){setDrag(true);setDs({x:e.clientX-pan.x,y:e.clientY-pan.y});}};
  const onMM=e=>{if(drag&&mode==='pan')setPan({x:e.clientX-ds.x,y:e.clientY-ds.y});};
  const onMU=()=>setDrag(false);
  const onCanvas=e=>{
    if(drag)return;
    const coords=el?.img?imgC(e):cntC(e);if(!coords)return;
    if(mode==='pin'){const p={id:nid,x:coords.x,y:coords.y,repairName:'',repairType:'linear',measurements:{},comment:'',hazard:'yellow',status:ST.TOREPAIR,surveyPhotos:[],fixingPhotos:[],donePhotos:[]};upd(ae,el=>({...el,pins:[...el.pins,p]}));setNid(n=>n+1);setModal(p);}
    else if(mode==='move-pin'&&movId){upd(ae,el=>({...el,pins:el.pins.map(p=>p.id===movId?{...p,...coords}:p)}));setMovId(null);setMode('pan');}
  };
  const onPin=id=>{
    if(mode==='move-pin'){setMovId(id);return;}
    if(mode==='delete-pin'){const pin=el.pins.find(p=>p.id===id);const name=pin?pin.repairName||('Pin #'+id):'Pin #'+id;if(!confirm('Move "'+name+'" to trash?'))return;upd(ae,el=>{const pin=el.pins.find(p=>p.id===id);if(!pin)return el;return{...el,pins:el.pins.filter(p=>p.id!==id),trash:[...(el.trash||[]),{...pin,deletedAt:new Date().toISOString()}]};});setMode('pan');showToast('🗑 Pin #'+id+' moved to trash');return;}
    setSelPin(id);const p=el.pins.find(p=>p.id===id);if(p)setModal({...p});
  };
  const savePin=u=>{upd(ae,el=>({...el,pins:el.pins.map(p=>p.id===u.id?u:p)}));setModal(null);setSelPin(null);};
  const trashPin=id=>{upd(ae,el=>{const pin=el.pins.find(p=>p.id===id);if(!pin)return el;return{...el,pins:el.pins.filter(p=>p.id!==id),trash:[...(el.trash||[]),{...pin,deletedAt:new Date().toISOString()}]};});setModal(null);setSelPin(null);showToast('🗑 Pin #'+id+' moved to trash');};
  const restorePin=(elevIdx,pinId)=>{upd(elevIdx,el=>{const pin=(el.trash||[]).find(p=>p.id===pinId);if(!pin)return el;const{deletedAt,...r}=pin;return{...el,pins:[...el.pins,r],trash:(el.trash||[]).filter(p=>p.id!==pinId)};});showToast('✓ Pin restored');};
  const addRT=r=>{const nl=rl.find(x=>x.name===r.name)?rl:[...rl,r];setRl(nl);setProject(p=>{const np={...p,repairList:nl};persist(np);return np;});};

  if(screen==='home')return<HomeScreen onOpen={openProject} onCreate={()=>setScreen('setup')}/>;
  if(screen==='setup')return<Setup onDone={createProject} onBack={()=>setScreen('home')}/>;

  const pins=el?.pins||[];
  const trashCount=project.elevations.reduce((s,e)=>s+(e.trash||[]).length,0);
  const iW=iRef.current?.offsetWidth||1,iH=iRef.current?.offsetHeight||1;
  const total=project.elevations.reduce((s,e)=>s+(e.pins||[]).length,0);
  const hint=mode==='pin'?'📍 Click to place a pin':mode==='move-pin'?(movId?'Moving #'+movId+' — click to reposition':'Click a pin to move'):mode==='delete-pin'?'🗑 Click a pin to trash it':'✋ Drag to pan · scroll to zoom';
  const modes=[{id:'pan',i:'✋',l:'Pan / View'},{id:'pin',i:'📍',l:'Add Pin'},{id:'move-pin',i:'↔',l:'Move Pin'},{id:'delete-pin',i:'🗑',l:'Delete Pin',danger:true}];
  const statusCounts={[ST.TOREPAIR]:pins.filter(p=>p.status===ST.TOREPAIR).length,[ST.FIXING]:pins.filter(p=>p.status===ST.FIXING).length,[ST.DONE]:pins.filter(p=>p.status===ST.DONE).length};

  return(
    <div style={{display:'flex',height:'100vh',background:C.bg,overflow:'hidden',userSelect:'none'}}>
      {/* LEFT */}
      <div style={{width:200,background:C.surface,borderRight:'1px solid '+C.border,display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{background:C.navyDark,padding:'0 14px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{minWidth:0}}>
            <div style={{fontSize:9,color:'#475569',letterSpacing:2.5,fontFamily:'Barlow Condensed',fontWeight:700}}>QUICK SURVEY</div>
            <div style={{fontSize:11,fontWeight:700,color:'#f1f5f9',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'Barlow Condensed'}}>{project.name}</div>
          </div>
          <button onClick={()=>setScreen('home')} style={{background:'none',border:'1px solid #1e3a5f',borderRadius:5,color:'#475569',fontSize:11,cursor:'pointer',padding:'3px 7px',flexShrink:0,marginLeft:6}}>⌂</button>
        </div>
        <div style={{padding:'8px 12px',borderBottom:'1px solid '+C.border}}>
          <label style={{display:'block',padding:'8px 10px',border:'1px dashed '+C.borderDark,borderRadius:7,color:C.textDim,fontSize:11,cursor:'pointer',textAlign:'center',background:C.card}}>
            {el?.img?'🔄 Change photo':'📷 Load photo'}
            <input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={onPhoto}/>
          </label>
        </div>
        <div style={{padding:'8px 12px',borderBottom:'1px solid '+C.border}}>
          <div style={{fontSize:9,color:C.textMuted,letterSpacing:1.5,marginBottom:6,fontFamily:'Barlow Condensed',fontWeight:700}}>MODE</div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {modes.map(m=>{const active=mode===m.id;const danger=m.danger;return(
              <button key={m.id} onClick={()=>{setMode(m.id);if(m.id!=='move-pin')setMovId(null);}}
                style={{padding:'6px 10px',borderRadius:6,border:'1px solid '+(active?(danger?'#dc2626':C.blue):C.border),background:active?(danger?'#dc262614':C.blueDim):C.card,color:active?(danger?'#dc2626':C.blue):(danger?'#9ca3af':C.textDim),fontSize:12,fontWeight:active?700:400,cursor:'pointer',textAlign:'left',fontFamily:'Barlow Condensed'}}>
                {m.i} {m.l}
              </button>
            );})}
          </div>
        </div>
        <div style={{padding:'8px 12px',borderBottom:'1px solid '+C.border}}>
          <div style={{fontSize:9,color:C.textMuted,letterSpacing:1.5,marginBottom:6,fontFamily:'Barlow Condensed',fontWeight:700}}>ZOOM {Math.round(zoom*100)}%</div>
          <div style={{display:'flex',gap:4}}>
            <button onClick={()=>setZoom(z=>Math.min(8,z*1.3))} style={{flex:1,padding:'5px',borderRadius:5,border:'1px solid '+C.border,background:C.card,color:C.textDim,fontSize:15,cursor:'pointer'}}>+</button>
            <button onClick={()=>{setZoom(1);setPan({x:0,y:0});}} style={{flex:1,padding:'5px',borderRadius:5,border:'1px solid '+C.border,background:C.card,color:C.textMuted,fontSize:9,cursor:'pointer',fontFamily:'Barlow Condensed'}}>RESET</button>
            <button onClick={()=>setZoom(z=>Math.max(0.3,z*0.77))} style={{flex:1,padding:'5px',borderRadius:5,border:'1px solid '+C.border,background:C.card,color:C.textDim,fontSize:15,cursor:'pointer'}}>−</button>
          </div>
        </div>
        {pins.length>0&&(
          <div style={{padding:'8px 12px',borderBottom:'1px solid '+C.border}}>
            <div style={{fontSize:9,color:C.textMuted,letterSpacing:1.5,marginBottom:7,fontFamily:'Barlow Condensed',fontWeight:700}}>THIS ELEVATION</div>
            {[ST.TOREPAIR,ST.FIXING,ST.DONE].map(s=>(
              <div key={s} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:6,height:6,borderRadius:'50%',background:SC[s]}}/><span style={{fontSize:10,color:C.textDim,fontFamily:'Barlow Condensed'}}>{SL[s]}</span></div>
                <span style={{fontSize:10,color:SC[s],fontFamily:'DM Mono',fontWeight:600}}>{statusCounts[s]}</span>
              </div>
            ))}
          </div>
        )}
        {rl.length>0&&(
          <div style={{padding:'8px 12px',borderBottom:'1px solid '+C.border,maxHeight:100,overflowY:'auto'}}>
            <div style={{fontSize:9,color:C.textMuted,letterSpacing:1.5,marginBottom:5,fontFamily:'Barlow Condensed',fontWeight:700}}>REPAIRS ({rl.length})</div>
            {rl.map((r,i)=>(
              <div key={i} style={{fontSize:10,color:C.textDim,padding:'2px 0',borderBottom:'1px solid '+C.border,display:'flex',justifyContent:'space-between'}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,fontFamily:'Barlow Condensed'}}>{r.name}</span>
                <span style={{color:C.textMuted,fontFamily:'DM Mono',marginLeft:4,flexShrink:0}}>{(RT.find(t=>t.id===r.type)||{unit:''}).unit}</span>
              </div>
            ))}
          </div>
        )}
        <div style={{flex:1}}/>
        <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:6,borderTop:'1px solid '+C.border}}>
          <button onClick={()=>setShowT(true)} style={{width:'100%',padding:'8px',borderRadius:7,border:'1px solid '+C.blue,background:C.blueDim,color:C.blue,fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'Barlow Condensed'}}>📊 SUMMARY {total>0?'('+total+')':''}</button>
          <button onClick={()=>setShowTrash(true)} style={{width:'100%',padding:'7px',borderRadius:7,border:'1px solid '+(trashCount>0?'#dc262630':C.border),background:C.card,color:trashCount>0?'#dc2626aa':C.textMuted,fontSize:11,cursor:'pointer',fontFamily:'Barlow Condensed'}}>🗑 TRASH {trashCount>0?'('+trashCount+')':''}</button>
        </div>
      </div>

      {/* CENTER */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{display:'flex',background:C.card,borderBottom:'1px solid '+C.border,overflowX:'auto',flexShrink:0}}>
          {project.elevations.map((e,i)=>{
            const ep=e.pins||[];const ed=ep.filter(p=>p.status===ST.DONE).length;
            return(
              <button key={i} onClick={()=>{setAe(i);setMode('pan');setMovId(null);setSelPin(null);setZoom(1);setPan({x:0,y:0});}}
                style={{padding:'10px 16px',border:'none',borderBottom:'2px solid '+(i===ae?C.navyDark:'transparent'),background:'transparent',color:i===ae?C.navyDark:C.textDim,fontSize:12,fontWeight:i===ae?700:400,cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6,fontFamily:'Barlow Condensed',transition:'all 0.1s'}}>
                {e.name.toUpperCase()}
                {ep.length>0&&<span style={{fontSize:9,color:i===ae?C.navyMid:C.textMuted,background:i===ae?C.blueDim:'#f3f4f6',padding:'1px 6px',borderRadius:8,fontFamily:'DM Mono'}}>{ed}/{ep.length}</span>}
                {e.img&&<span style={{fontSize:8,color:'#16a34a',background:'#dcfce7',padding:'1px 4px',borderRadius:4}}>IMG</span>}
              </button>
            );
          })}
        </div>
        <div style={{flex:1,position:'relative',overflow:'hidden',cursor:mode==='pin'||mode==='move-pin'?'crosshair':mode==='delete-pin'?'not-allowed':drag?'grabbing':'grab',background:'#d8dce4'}}
          ref={cRef} onWheel={onWheel} onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onClick={onCanvas}>
          {!el?.img?(
            <>
              <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient('+C.border+' 1px,transparent 1px),linear-gradient(90deg,'+C.border+' 1px,transparent 1px)',backgroundSize:'32px 32px',pointerEvents:'none',opacity:0.8}}/>
              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,pointerEvents:'none'}}>
                <div style={{fontSize:48,opacity:0.1}}>🏢</div>
                <div style={{fontSize:11,color:C.textMuted,fontFamily:'Barlow Condensed',letterSpacing:1}}>NO PHOTO — PINS FLOAT ON CANVAS</div>
              </div>
              {pins.map(p=><Marker key={p.id} pin={p} selected={selPin===p.id} isMoving={movId===p.id} isDeleting={mode==='delete-pin'} onClick={onPin} x={p.x*csz.w/100} y={p.y*csz.h/100}/>)}
            </>
          ):(
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{transform:'translate('+pan.x+'px,'+pan.y+'px) scale('+zoom+')',transformOrigin:'center center',position:'relative',display:'inline-block'}}>
                <img ref={iRef} src={el.img} alt="" style={{display:'block',maxWidth:'72vw',maxHeight:'88vh',objectFit:'contain',pointerEvents:'none'}} draggable={false}/>
                <div style={{position:'absolute',inset:0}}>
                  {pins.map(p=><Marker key={p.id} pin={p} selected={selPin===p.id} isMoving={movId===p.id} isDeleting={mode==='delete-pin'} onClick={onPin} x={p.x*iW/100} y={p.y*iH/100}/>)}
                </div>
              </div>
            </div>
          )}
          <div style={{position:'absolute',bottom:12,left:'50%',transform:'translateX(-50%)',background:'rgba(17,24,39,0.88)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:20,padding:'5px 16px',fontSize:11,color:mode==='pin'||mode==='move-pin'?'#93c5fd':mode==='delete-pin'?'#fca5a5':'#94a3b8',pointerEvents:'none',fontFamily:'Barlow Condensed',letterSpacing:0.5}}>{hint}</div>
          <div style={{position:'absolute',top:12,left:12,background:'rgba(17,24,39,0.88)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:7,padding:'4px 12px',fontSize:10,color:'#93c5fd',fontWeight:700,letterSpacing:2,pointerEvents:'none',fontFamily:'Barlow Condensed'}}>{(el?.name||'').toUpperCase()} · {project.name.toUpperCase()}</div>
        </div>
      </div>

      {/* RIGHT INDEX */}
      {pins.length>0&&(
        <div style={{width:196,background:C.surface,borderLeft:'1px solid '+C.border,display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{padding:'10px 14px',borderBottom:'1px solid '+C.border,display:'flex',justifyContent:'space-between',alignItems:'center',background:C.navyDark}}>
            <span style={{fontSize:9,color:'#475569',letterSpacing:2,fontFamily:'Barlow Condensed',fontWeight:700}}>INDEX</span>
            <span style={{fontSize:9,color:'#475569',fontFamily:'DM Mono'}}>{pins.length}</span>
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {pins.map(p=>{const sc=SC[p.status]||C.textMuted;return(
              <div key={p.id} onClick={()=>{if(mode!=='delete-pin')onPin(p.id);}} style={{padding:'9px 14px',borderBottom:'1px solid '+C.border,cursor:'pointer',background:selPin===p.id?C.blueDim:C.card,transition:'background 0.1s'}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                  <div style={{background:pCol(p),borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',flexShrink:0,fontFamily:'DM Mono'}}>{p.id}</div>
                  <span style={{fontSize:12,fontWeight:600,color:C.navyDark,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,fontFamily:'Barlow Condensed'}}>{p.repairName||'Unnamed'}</span>
                </div>
                <div style={{paddingLeft:25,display:'flex',gap:5,alignItems:'center'}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:sc,flexShrink:0}}/>
                  <span style={{fontSize:9,fontWeight:700,color:sc,fontFamily:'Barlow Condensed'}}>{SL[p.status]||'new'}</span>
                  {p.hazard&&<span style={{fontSize:9,color:HC[p.hazard],marginLeft:'auto'}}>●</span>}
                </div>
              </div>
            );})}
          </div>
        </div>
      )}

      {modal&&<PinModal pin={modal} repairList={rl} onSave={savePin} onTrash={trashPin} onClose={()=>{setModal(null);setSelPin(null);}} onAddRT={addRT}/>}
      {showT&&<SummaryTable project={project} onClose={()=>setShowT(false)}/>}
      {showTrash&&<TrashPanel project={project} onRestore={restorePin} onClose={()=>setShowTrash(false)}/>}
      {toast&&<Toast msg={toast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
