<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAL — Survey</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#e8e8e8;height:100vh;overflow:hidden;}
#root{height:100vh;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const USER="Lionel Melo";
const SKEY="ral-survey-v5";

const RT=[
  {id:'volumen',label:'Volumen',unit:'L',
   fields:[{k:'largo',l:'Largo (mm)'},{k:'ancho',l:'Ancho (mm)'},{k:'prof',l:'Prof (mm)'}],
   calc:d=>{const v=(parseFloat(d.largo||0)*parseFloat(d.ancho||0)*parseFloat(d.prof||0))/1000000;return v>0?v.toFixed(3)+' L':'—';},
   measCode:d=>[(d.largo||0),(d.ancho||0),(d.prof||0)].join('x')},
  {id:'area',label:'Área',unit:'m²',
   fields:[{k:'d1',l:'Dim 1 (mm)'},{k:'d2',l:'Dim 2 (mm)'}],
   calc:d=>{const a=(parseFloat(d.d1||0)*parseFloat(d.d2||0))/1000000;return a>0?a.toFixed(4)+' m²':'—';},
   measCode:d=>[(d.d1||0),(d.d2||0)].join('x')},
  {id:'linear',label:'Linear m',unit:'m',
   fields:[{k:'len',l:'Longitud (mm)'}],
   calc:d=>{const m=parseFloat(d.len||0)/1000;return m>0?m.toFixed(3)+' m':'—';},
   measCode:d=>(d.len||0)+''},
  {id:'cantidad',label:'Cantidad',unit:'ud',
   fields:[{k:'qty',l:'Cantidad'}],
   calc:d=>parseFloat(d.qty||0)>0?parseFloat(d.qty||0).toFixed(0)+' ud':'—',
   measCode:d=>(d.qty||0)+''}
];

const HAZARDS=[
  {id:'yellow',label:'Recommendation',color:'#eab308'},
  {id:'orange',label:'Urgent',        color:'#f97316'},
  {id:'red',   label:'Hazard',        color:'#ef4444'}
];
const HC={yellow:'#eab308',orange:'#f97316',red:'#ef4444'};
const pCol=p=>HC[p.hazard]||'#6b7280';
const getMeas=(pin,m)=>{const r=RT.find(r=>r.id===pin.repairType);if(!r||!(m||pin.measurements))return'—';return r.calc(m||pin.measurements);};
const abbrev=str=>{if(!str)return'XX';const words=str.trim().split(/\s+/);return words.length>1?words.map(w=>w[0].toUpperCase()).join('').slice(0,3):str.slice(0,2).toUpperCase();};

const fmtDateLong=iso=>{const d=new Date(iso||Date.now());return d.toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' '+d.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};
const fmtDate=iso=>{if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-NZ')+' '+d.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});};

const loadProjs=()=>{try{const d=localStorage.getItem(SKEY);return d?JSON.parse(d):[];}catch{return[];}};
const saveProjs=list=>{try{localStorage.setItem(SKEY,JSON.stringify(list));}catch{alert('Storage full.');}};

const ST={SURVEY:'survey',PROGRESS:'progress',FINISH:'finish',COMPLETE:'complete'};
const SC={survey:'#3b82f6',progress:'#f97316',finish:'#8b5cf6',complete:'#4ade80'};
const SL={survey:'Survey',progress:'Progress',finish:'Finish',complete:'Complete'};

// ── WATERMARK ─────────────────────────────────────────────────────────────────
// tag = 'Survey' | 'P1'..'P10' | 'Finish 1'..'Finish 4'
// code = D{day}.{elevAbbr}.N{pinId}.{repairAbbr}.{measCode}.{shortTag}
async function wm(dataUrl, pin, tag, projectName, elevName){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.width;c.height=img.height;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0);

      const now=new Date();
      const line1='#'+pin.id+'  '+(pin.repairName||'Repair')+'  '+getMeas(pin)+'  '+tag;
      const line2=fmtDateLong(now.toISOString());
      const line3=USER;

      const fs=Math.round(img.height*0.038);
      
      const pad=fs,lh=fs*1.7;

      ctx.font='700 '+fs+'px Arial,sans-serif';
      const bw=Math.max(ctx.measureText(line1).width,ctx.measureText(line2).width,ctx.measureText(line3).width)+pad*2.2;
      const bh=lh*3+pad*2;
      const bx=pad;
      const by=img.height-bh-pad;

      // solid dark background
      ctx.globalAlpha=0.72;
      ctx.fillStyle='#0a0a0a';
      ctx.beginPath();
      ctx.roundRect(bx,by,bw,bh,8);
      ctx.fill();
      ctx.globalAlpha=1;

      // all lines bold Arial
      ctx.font='700 '+fs+'px Arial,sans-serif';
      ctx.fillStyle='#ffffff';
      ctx.fillText(line1,bx+pad,by+pad+fs);
      ctx.fillText(line2,bx+pad,by+pad+lh+fs);
      ctx.fillText(line3,bx+pad,by+pad+lh*2+fs);

      resolve(c.toDataURL('image/jpeg',0.88));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function HomeScreen({onOpen,onCreate}){
  const [list,setList]=useState(loadProjs);
  const del=id=>{if(!confirm('Delete this project?'))return;const nl=list.filter(p=>p.id!==id);setList(nl);saveProjs(nl);};
  return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0a0a'}}>
      <div style={{width:520,maxWidth:'95vw'}}>
        <div style={{fontSize:10,color:'#444',letterSpacing:2,marginBottom:8}}>RAL — FACADE SURVEY</div>
        <div style={{fontSize:26,fontWeight:700,color:'#fff',marginBottom:4}}>Projects</div>
        <div style={{fontSize:13,color:'#444',marginBottom:22}}>Select a project or create a new one</div>
        {list.length===0
          ?<div style={{textAlign:'center',color:'#2a2a2a',fontSize:13,padding:'32px',border:'1px dashed #1e1e1e',borderRadius:12,marginBottom:10}}>No saved projects</div>
          :<div style={{maxHeight:380,overflowY:'auto',marginBottom:8}}>
            {list.map(p=>{
              const total=p.elevations.reduce((s,e)=>s+(e.pins||[]).length,0);
              const done=p.elevations.reduce((s,e)=>s+(e.pins||[]).filter(pi=>pi.status===ST.COMPLETE).length,0);
              return(
                <div key={p.id} style={{background:'#111',border:'1px solid #1e1e1e',borderRadius:10,padding:'14px 16px',display:'flex',alignItems:'center',cursor:'pointer',marginBottom:8}} onClick={()=>onOpen(p)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:'#e0e0e0'}}>{p.name}</div>
                    <div style={{fontSize:11,color:'#444',marginTop:3}}>{p.elevations.length} elevation{p.elevations.length!==1?'s':''} · {total} pins · {done} complete</div>
                  </div>
                  <button style={{background:'none',border:'none',color:'#333',cursor:'pointer',fontSize:16,padding:'4px 8px'}} onClick={e=>{e.stopPropagation();del(p.id);}}>🗑</button>
                </div>
              );
            })}
          </div>
        }
        <button onClick={onCreate} style={{width:'100%',padding:'12px',background:'#1d4ed8',border:'none',borderRadius:10,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>+ New project</button>
      </div>
    </div>
  );
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function Setup({onDone,onBack}){
  const [step,setStep]=useState(0);
  const [name,setName]=useState('');
  const [cnt,setCnt]=useState(1);
  const [names,setNames]=useState(['North']);
  const defs=['North','South','East','West','Roof','Entry','Rear','Side'];
  const updCnt=n=>{const c=Math.min(8,Math.max(1,parseInt(n)||1));setCnt(c);setNames(p=>{const a=[...p];while(a.length<c)a.push(defs[a.length]||'Elevation '+(a.length+1));return a.slice(0,c);});};
  const I={width:'100%',background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:8,padding:'10px 12px',color:'#f0f0f0',fontSize:14,outline:'none',marginBottom:14};
  const L={fontSize:12,color:'#666',display:'block',marginBottom:5,fontWeight:500};
  return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0a0a'}}>
      <div style={{background:'#111',border:'1px solid #1e1e1e',borderRadius:16,padding:36,width:460,maxWidth:'95vw'}}>
        <div style={{fontSize:10,color:'#444',letterSpacing:2,marginBottom:18}}>RAL — NEW PROJECT</div>
        {step===0?(
          <>
            <div style={{fontSize:22,fontWeight:700,color:'#fff',marginBottom:20}}>Project details</div>
            <label style={L}>Project name *</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Auckland Tower" style={I} onKeyDown={e=>e.key==='Enter'&&name.trim()&&setStep(1)}/>
            <label style={L}>Number of elevations (1–8)</label>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <button onClick={()=>updCnt(cnt-1)} style={{width:40,height:40,borderRadius:8,border:'1px solid #2a2a2a',background:'#1a1a1a',color:'#888',fontSize:20,cursor:'pointer',flexShrink:0}}>−</button>
              <input value={cnt} onChange={e=>updCnt(e.target.value)} style={{flex:1,background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:8,padding:'10px',color:'#f0f0f0',fontSize:18,outline:'none',textAlign:'center',fontWeight:700}}/>
              <button onClick={()=>updCnt(cnt+1)} style={{width:40,height:40,borderRadius:8,border:'1px solid #2a2a2a',background:'#1a1a1a',color:'#888',fontSize:20,cursor:'pointer',flexShrink:0}}>+</button>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={onBack} style={{flex:1,padding:'10px',background:'transparent',border:'1px solid #2a2a2a',borderRadius:8,color:'#888',fontSize:13,cursor:'pointer'}}>← Back</button>
              <button disabled={!name.trim()} onClick={()=>setStep(1)} style={{flex:2,padding:'11px',background:name.trim()?'#1d4ed8':'#1a1a1a',border:'none',borderRadius:8,color:name.trim()?'#fff':'#444',fontSize:14,fontWeight:600,cursor:name.trim()?'pointer':'default'}}>Next →</button>
            </div>
          </>
        ):(
          <>
            <div style={{fontSize:22,fontWeight:700,color:'#fff',marginBottom:20}}>Name your elevations</div>
            <div style={{maxHeight:340,overflowY:'auto'}}>
              {Array.from({length:cnt}).map((_,i)=>(
                <div key={i} style={{marginBottom:10}}>
                  <label style={L}>Elevation {i+1}</label>
                  <input value={names[i]||''} onChange={e=>{const n=[...names];n[i]=e.target.value;setNames(n);}} placeholder={defs[i]||'Elevation '+(i+1)} style={{...I,marginBottom:0}}/>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10,marginTop:16}}>
              <button onClick={()=>setStep(0)} style={{flex:1,padding:'10px',background:'transparent',border:'1px solid #2a2a2a',borderRadius:8,color:'#888',fontSize:13,cursor:'pointer'}}>← Back</button>
              <button onClick={()=>onDone(name.trim(),names)} style={{flex:2,padding:'10px',background:'#1d4ed8',border:'none',borderRadius:8,color:'#fff',fontSize:14,fontWeight:600,cursor:'pointer'}}>Start survey</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── PHOTO NAVIGATOR ───────────────────────────────────────────────────────────
function PhotoNav({photos,initIdx=0,onClose}){
  const [idx,setIdx]=useState(Math.min(initIdx,photos.length-1));
  if(!photos.length)return null;
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.96)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:400}}>
      <div onClick={e=>e.stopPropagation()} style={{display:'flex',alignItems:'center',gap:14,maxWidth:'96vw'}}>
        <button onClick={()=>setIdx(i=>Math.max(0,i-1))} disabled={idx===0} style={{background:'rgba(255,255,255,0.08)',border:'1px solid #333',borderRadius:'50%',color:idx===0?'#333':'#fff',width:46,height:46,fontSize:22,cursor:idx===0?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>‹</button>
        <div style={{textAlign:'center'}}>
          <img src={photos[idx]} style={{maxWidth:'78vw',maxHeight:'80vh',objectFit:'contain',borderRadius:8,display:'block'}} alt=""/>
          <div style={{fontSize:11,color:'#555',marginTop:8}}>{idx+1} / {photos.length}</div>
        </div>
        <button onClick={()=>setIdx(i=>Math.min(photos.length-1,i+1))} disabled={idx===photos.length-1} style={{background:'rgba(255,255,255,0.08)',border:'1px solid #333',borderRadius:'50%',color:idx===photos.length-1?'#333':'#fff',width:46,height:46,fontSize:22,cursor:idx===photos.length-1?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>›</button>
      </div>
      <button onClick={onClose} style={{position:'absolute',top:16,right:16,background:'rgba(0,0,0,0.5)',border:'1px solid #444',borderRadius:'50%',color:'#fff',width:36,height:36,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
    </div>
  );
}

// ── PIN MODAL ─────────────────────────────────────────────────────────────────
function PinModal({pin,repairList,onSave,onTrash,onClose,onAddRT,projectName,elevName}){
  const isNew=!pin.repairName;
  const [view,setView]=useState(isNew?(repairList.length>0?'choose':'new'):'status');
  const [selR,setSelR]=useState(repairList.find(r=>r.name===pin.repairName)||null);
  const [newName,setNewName]=useState('');
  const [rtype,setRtype]=useState('area');
  const [surveyReq,setSurveyReq]=useState(1);
  const [progReq,setProgReq]=useState(1);
  const [finReq,setFinReq]=useState(1);
  const [meas,setMeas]=useState(pin.measurements||{});
  const [comment,setComment]=useState('');
  const [hazard,setHazard]=useState(pin.hazard||'yellow');
  const [stagingPhotos,setStagingPhotos]=useState([]);
  const [measChanged,setMeasChanged]=useState(false);
  const [saving,setSaving]=useState(false);
  const [photoNav,setPhotoNav]=useState(null);

  const ert=selR?selR.type:rtype;
  const rt=RT.find(r=>r.id===ert);
  const sr=selR||{surveyPhotosRequired:surveyReq,progressPhasesRequired:progReq,finishPhasesRequired:finReq};
  const surveyPhotos=pin.surveyPhotos||[];
  const phases=pin.phases||[];
  const finishPhases=pin.finishPhases||[];
  const allPhotos=[...surveyPhotos,...phases.flatMap(p=>p.photos||[]),...finishPhases.flatMap(p=>p.photos||[])];
  const currentStatus=pin.status||ST.SURVEY;

  const addPhotos=files=>{Array.from(files).forEach(f=>{const fr=new FileReader();fr.onload=ev=>setStagingPhotos(p=>[...p,ev.target.result]);fr.readAsDataURL(f);});};
  const pickR=r=>{setSelR(r);setRtype(r.type);setMeas({});setView('fill');};
  const onMeasChange=(k,v)=>{const prev=pin.measurements||{};const updated={...meas,[k]:v};setMeas(updated);setMeasChanged(JSON.stringify(prev)!==JSON.stringify({...prev,[k]:v}));};

  const saveSurvey=async()=>{
    if(stagingPhotos.length<sr.surveyPhotosRequired){alert('Please upload at least '+sr.surveyPhotosRequired+' survey photo(s).');return;}
    setSaving(true);
    const rn=selR?selR.name:newName;
    const repDef={name:rn,type:ert,surveyPhotosRequired:sr.surveyPhotosRequired,progressPhasesRequired:sr.progressPhasesRequired||progReq,finishPhasesRequired:sr.finishPhasesRequired||finReq};
    if(!selR)onAddRT(repDef);
    const pinData={...pin,repairName:rn,repairType:ert,measurements:meas};
    const tagged=await Promise.all(stagingPhotos.map((p,i)=>wm(p,pinData,'Survey '+(i+1),projectName,elevName)));
    onSave({...pinData,comment,hazard,status:ST.PROGRESS,surveyPhotos:tagged,phases:[],finishPhases:[],
      surveyPhotosRequired:repDef.surveyPhotosRequired,progressPhasesRequired:repDef.progressPhasesRequired,finishPhasesRequired:repDef.finishPhasesRequired});
    setSaving(false);
  };

  const savePhase=async(type)=>{
    if(stagingPhotos.length===0){alert('Please upload at least 1 photo.');return;}
    if(measChanged&&!comment.trim()){alert('Measurements changed — please add a comment explaining why.');return;}
    setSaving(true);
    const pNum=(type==='progress'?phases.length:finishPhases.length)+1;
    const tag=type==='progress'?'P'+pNum:'Finish '+pNum;
    const pinForWm={...pin,measurements:meas};
    const tagged=await Promise.all(stagingPhotos.map(p=>wm(p,pinForWm,tag,projectName,elevName)));
    const newPhase={phaseNum:pNum,measurements:{...meas},comment,photos:tagged,date:new Date().toISOString()};
    let updated={...pin,measurements:meas};
    if(measChanged)updated.comment=comment;
    if(type==='progress'){
      const np=[...phases,newPhase];updated.phases=np;
      updated.status=np.length>=(pin.progressPhasesRequired||1)?ST.FINISH:ST.PROGRESS;
    }else{
      const nf=[...finishPhases,newPhase];updated.finishPhases=nf;
      updated.status=nf.length>=(pin.finishPhasesRequired||1)?ST.COMPLETE:ST.FINISH;
    }
    onSave(updated);setSaving(false);
  };

  const I={width:'100%',background:'#1a1a1a',border:'1px solid #252525',borderRadius:7,padding:'8px 11px',color:'#f0f0f0',fontSize:13,outline:'none'};
  const L={fontSize:10,color:'#555',display:'block',marginBottom:5,fontWeight:500};

  const NumStepper=({val,setVal,min,max,lbl})=>(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:9,color:'#555',marginBottom:5}}>{lbl}</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button onClick={()=>setVal(v=>Math.max(min,v-1))} style={{width:30,height:30,borderRadius:6,border:'1px solid #252525',background:'#1a1a1a',color:'#888',fontSize:15,cursor:'pointer'}}>−</button>
        <div style={{flex:1,textAlign:'center',fontSize:17,fontWeight:700,color:'#e0e0e0'}}>{val}</div>
        <button onClick={()=>setVal(v=>Math.min(max,v+1))} style={{width:30,height:30,borderRadius:6,border:'1px solid #252525',background:'#1a1a1a',color:'#888',fontSize:15,cursor:'pointer'}}>+</button>
      </div>
    </div>
  );

  const StagingArea=({max,label})=>{
    const rem=max-stagingPhotos.length;
    return(
      <div style={{marginBottom:12}}>
        {stagingPhotos.length>0&&(
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
            {stagingPhotos.map((p,i)=>(
              <div key={i} style={{position:'relative',width:52,height:40,borderRadius:6,overflow:'hidden',border:'1px solid #2a2a2a'}}>
                <img src={p} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                <button onClick={()=>setStagingPhotos(s=>s.filter((_,j)=>j!==i))} style={{position:'absolute',top:1,right:1,background:'rgba(0,0,0,0.7)',border:'none',borderRadius:'50%',color:'#fff',width:15,height:15,cursor:'pointer',fontSize:9,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
              </div>
            ))}
          </div>
        )}
        {rem>0&&(
          <label style={{display:'block',padding:'11px',border:'1px dashed #252525',borderRadius:8,textAlign:'center',color:'#444',fontSize:12,cursor:'pointer'}}>
            📷 {label} ({stagingPhotos.length}/{max})
            <input type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={e=>addPhotos(e.target.files)}/>
          </label>
        )}
        {rem<=0&&<div style={{fontSize:11,color:'#4ade80',textAlign:'center',padding:'5px'}}>✓ {max} photo{max!==1?'s':''} ready</div>}
      </div>
    );
  };

  const hborder=HC[hazard]?HC[hazard]+'55':'#222';

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#111',border:'1px solid '+hborder,borderRadius:14,width:380,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 24px 80px rgba(0,0,0,0.9)'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid #1a1a1a',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{background:pCol(pin),borderRadius:'50%',width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff'}}>{pin.id}</div>
            <span style={{fontSize:14,fontWeight:600,color:'#fff'}}>Pin #{pin.id}</span>
            {!isNew&&<span style={{fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:10,background:SC[currentStatus]+'22',color:SC[currentStatus]}}>{SL[currentStatus]}</span>}
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#444',fontSize:20,cursor:'pointer'}}>×</button>
        </div>
        <div style={{padding:'16px 18px'}}>

          {view==='status'&&(
            <>
              <div style={{padding:'10px 14px',background:'#151515',borderRadius:8,border:'1px solid #1e1e1e',marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:600,color:'#e0e0e0',marginBottom:3}}>{pin.repairName}</div>
                <div style={{fontSize:11,color:'#555',fontFamily:'DM Mono'}}>{getMeas(pin)}</div>
                {pin.hazard&&<div style={{fontSize:10,color:HC[pin.hazard],marginTop:4,fontWeight:600}}>{(HAZARDS.find(h=>h.id===pin.hazard)||{label:''}).label}</div>}
                {pin.comment&&<div style={{fontSize:11,color:'#555',marginTop:4,fontStyle:'italic'}}>"{pin.comment}"</div>}
              </div>
              {allPhotos.length>0&&(
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:9,color:'#444',marginBottom:6}}>ALL PHOTOS ({allPhotos.length})</div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    {allPhotos.map((p,i)=>(
                      <div key={i} onClick={()=>setPhotoNav({photos:allPhotos,startIdx:i})} style={{width:46,height:36,borderRadius:5,overflow:'hidden',border:'1px solid #2a2a2a',cursor:'pointer'}}>
                        <img src={p} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {phases.length>0&&phases.map((ph,i)=>(
                <div key={i} style={{fontSize:10,color:'#555',padding:'4px 0',borderBottom:'1px solid #141414',display:'flex',justifyContent:'space-between'}}>
                  <span>P{ph.phaseNum} · {ph.photos.length} photo{ph.photos.length!==1?'s':''}</span>
                  <span style={{fontFamily:'DM Mono'}}>{getMeas(pin,ph.measurements)}</span>
                </div>
              ))}
              {currentStatus===ST.PROGRESS&&(
                <button onClick={()=>{setMeas({...pin.measurements});setMeasChanged(false);setComment('');setStagingPhotos([]);setView('progress');}} style={{width:'100%',padding:'10px',background:'#f9731620',border:'1px solid #f97316',borderRadius:8,color:'#f97316',fontWeight:600,fontSize:13,cursor:'pointer',marginTop:12,marginBottom:6}}>
                  📸 Progress phase {phases.length+1} / {pin.progressPhasesRequired||1}
                </button>
              )}
              {currentStatus===ST.FINISH&&(
                <button onClick={()=>{setMeas({...pin.measurements});setMeasChanged(false);setComment('');setStagingPhotos([]);setView('finish');}} style={{width:'100%',padding:'10px',background:'#8b5cf620',border:'1px solid #8b5cf6',borderRadius:8,color:'#8b5cf6',fontWeight:600,fontSize:13,cursor:'pointer',marginTop:12,marginBottom:6}}>
                  🏁 Finish phase {finishPhases.length+1} / {pin.finishPhasesRequired||1}
                </button>
              )}
              {currentStatus===ST.COMPLETE&&(
                <div style={{textAlign:'center',padding:'10px',background:'#4ade8010',border:'1px solid #4ade8033',borderRadius:8,color:'#4ade80',fontSize:13,fontWeight:600,marginTop:12,marginBottom:6}}>✓ Complete</div>
              )}
            </>
          )}

          {view==='choose'&&(
            <>
              <div style={{display:'flex',gap:6,marginBottom:12}}>
                <button style={{flex:1,padding:'7px',borderRadius:6,border:'1px solid #3b82f6',background:'#1d4ed818',color:'#60a5fa',fontSize:12,cursor:'pointer'}}>Repair list ({repairList.length})</button>
                <button onClick={()=>setView('new')} style={{flex:1,padding:'7px',borderRadius:6,border:'1px solid #222',background:'transparent',color:'#555',fontSize:12,cursor:'pointer'}}>+ New repair</button>
              </div>
              {repairList.map((r,i)=>(
                <div key={i} onClick={()=>pickR(r)} style={{padding:'10px 12px',borderRadius:7,border:'1px solid #1e1e1e',background:'#151515',marginBottom:6,cursor:'pointer'}}>
                  <div style={{fontSize:13,color:'#e0e0e0',fontWeight:500}}>{r.name}</div>
                  <div style={{fontSize:10,color:'#444',fontFamily:'DM Mono',marginTop:2}}>{(RT.find(t=>t.id===r.type)||{label:''}).label} · S:{r.surveyPhotosRequired} P:{r.progressPhasesRequired} F:{r.finishPhasesRequired}</div>
                </div>
              ))}
            </>
          )}

          {view==='new'&&(
            <>
              <div style={{display:'flex',gap:6,marginBottom:12}}>
                {repairList.length>0&&<button onClick={()=>setView('choose')} style={{flex:1,padding:'7px',borderRadius:6,border:'1px solid #222',background:'transparent',color:'#555',fontSize:12,cursor:'pointer'}}>Repair list</button>}
                <button style={{flex:repairList.length>0?1:2,padding:'7px',borderRadius:6,border:'1px solid #3b82f6',background:'#1d4ed818',color:'#60a5fa',fontSize:12,cursor:'pointer'}}>+ New repair</button>
              </div>
              <label style={L}>REPAIR NAME</label>
              <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Joint" style={{...I,marginBottom:14}}/>
              <label style={L}>REPAIR TYPE</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:14}}>
                {RT.map(t=>(
                  <button key={t.id} onClick={()=>setRtype(t.id)} style={{padding:'7px 8px',borderRadius:6,border:'1.5px solid '+(rtype===t.id?'#3b82f6':'#222'),background:rtype===t.id?'#1d4ed818':'transparent',color:rtype===t.id?'#60a5fa':'#666',fontSize:12,fontWeight:rtype===t.id?600:400,cursor:'pointer',textAlign:'left'}}>{t.label}</button>
                ))}
              </div>
              <label style={L}>PHOTO REQUIREMENTS</label>
              <div style={{background:'#141414',borderRadius:8,padding:'12px',marginBottom:14}}>
                <NumStepper val={surveyReq} setVal={setSurveyReq} min={1} max={3} lbl="Survey photos (1–3)"/>
                <NumStepper val={progReq} setVal={setProgReq} min={1} max={10} lbl="Progress phases (1–10)"/>
                <NumStepper val={finReq} setVal={setFinReq} min={1} max={4} lbl="Finish phases (1–4)"/>
              </div>
              <button disabled={!newName.trim()} onClick={()=>setView('fill')} style={{width:'100%',padding:'9px',background:newName.trim()?'#1d4ed8':'#1a1a1a',border:'none',borderRadius:8,color:newName.trim()?'#fff':'#444',fontSize:13,fontWeight:600,cursor:newName.trim()?'pointer':'default'}}>Continue →</button>
            </>
          )}

          {view==='fill'&&(
            <>
              <div style={{padding:'8px 12px',background:'#151515',borderRadius:7,border:'1px solid #1e1e1e',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                <span style={{fontSize:13,color:'#e0e0e0',fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selR?selR.name:newName}</span>
                <span style={{fontSize:10,color:'#444',fontFamily:'DM Mono',flexShrink:0}}>{(RT.find(t=>t.id===ert)||{label:''}).label}</span>
                <button onClick={()=>{setView(repairList.length>0?'choose':'new');setSelR(null);}} style={{background:'none',border:'none',color:'#444',fontSize:12,cursor:'pointer',flexShrink:0}}>✎</button>
              </div>
              {rt&&(
                <>
                  <label style={L}>MEASUREMENTS</label>
                  <div style={{display:'grid',gridTemplateColumns:rt.fields.length===3?'1fr 1fr 1fr':'1fr 1fr',gap:6,marginBottom:6}}>
                    {rt.fields.map(f=>(
                      <div key={f.k}><div style={{fontSize:9,color:'#444',marginBottom:3}}>{f.l}</div><input type="number" min="0" value={meas[f.k]||''} onChange={e=>setMeas(p=>({...p,[f.k]:e.target.value}))} placeholder="0" style={{...I,padding:'7px 8px'}}/></div>
                    ))}
                  </div>
                  <div style={{fontSize:12,color:'#3b82f6',marginBottom:14,fontFamily:'DM Mono',padding:'5px 10px',background:'#1d4ed810',borderRadius:6}}>= {rt.calc(meas)}</div>
                </>
              )}
              <label style={L}>COMMENT</label>
              <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="Observations..." rows={2} style={{...I,resize:'none',marginBottom:14}}/>
              <label style={L}>HAZARD LEVEL</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5,marginBottom:14}}>
                {HAZARDS.map(h=>(
                  <button key={h.id} onClick={()=>setHazard(h.id)} style={{padding:'7px 4px',borderRadius:6,border:'1.5px solid '+(hazard===h.id?h.color:'#222'),background:hazard===h.id?h.color+'22':'transparent',color:hazard===h.id?h.color:'#555',fontSize:10,fontWeight:hazard===h.id?700:400,cursor:'pointer',textAlign:'center'}}>● {h.label}</button>
                ))}
              </div>
              <label style={L}>SURVEY PHOTOS * (min {sr.surveyPhotosRequired})</label>
              <StagingArea max={sr.surveyPhotosRequired} label="Add survey photos"/>
              {stagingPhotos.length<sr.surveyPhotosRequired&&<div style={{fontSize:11,color:'#ef4444',marginBottom:10,textAlign:'center'}}>⚠ {sr.surveyPhotosRequired-stagingPhotos.length} more required</div>}
              <button onClick={saveSurvey} disabled={saving||stagingPhotos.length<sr.surveyPhotosRequired}
                style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:stagingPhotos.length>=sr.surveyPhotosRequired?'#1d4ed8':'#1a1a1a',color:stagingPhotos.length>=sr.surveyPhotosRequired?'#fff':'#444',fontWeight:600,fontSize:13,cursor:stagingPhotos.length>=sr.surveyPhotosRequired?'pointer':'default',opacity:saving?0.6:1}}>
                {saving?'Saving...':'Save survey'}
              </button>
            </>
          )}

          {view==='progress'&&(
            <>
              <div style={{padding:'10px 14px',background:'#f9731610',borderRadius:8,border:'1px solid #f9731633',marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:600,color:'#f97316'}}>Progress — Phase {phases.length+1} of {pin.progressPhasesRequired||1}</div>
              </div>
              {rt&&(
                <>
                  <label style={L}>MEASUREMENTS {measChanged&&<span style={{color:'#f97316',marginLeft:4}}>● changed</span>}</label>
                  <div style={{display:'grid',gridTemplateColumns:rt.fields.length===3?'1fr 1fr 1fr':'1fr 1fr',gap:6,marginBottom:6}}>
                    {rt.fields.map(f=>(
                      <div key={f.k}><div style={{fontSize:9,color:'#444',marginBottom:3}}>{f.l}</div><input type="number" min="0" value={meas[f.k]||''} onChange={e=>onMeasChange(f.k,e.target.value)} placeholder="0" style={{...I,padding:'7px 8px',borderColor:measChanged?'#f97316':'#252525'}}/></div>
                    ))}
                  </div>
                  <div style={{fontSize:12,color:'#3b82f6',marginBottom:12,fontFamily:'DM Mono',padding:'5px 10px',background:'#1d4ed810',borderRadius:6}}>= {rt.calc(meas)}</div>
                </>
              )}
              <label style={L}>COMMENT {measChanged&&<span style={{color:'#ef4444'}}>* required</span>}</label>
              <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder={measChanged?'Explain measurement change...':'Notes for this phase...'} rows={2} style={{...I,resize:'none',marginBottom:12,borderColor:measChanged&&!comment.trim()?'#ef4444':'#252525'}}/>
              <label style={L}>PHASE PHOTO (min 1)</label>
              <StagingArea max={10} label="Add progress photo"/>
              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button onClick={()=>setView('status')} style={{flex:1,padding:'9px',background:'transparent',border:'1px solid #2a2a2a',borderRadius:8,color:'#888',fontSize:13,cursor:'pointer'}}>← Back</button>
                <button onClick={()=>savePhase('progress')} disabled={saving||stagingPhotos.length===0} style={{flex:2,padding:'10px',borderRadius:8,border:'none',background:stagingPhotos.length>0?'#f97316':'#1a1a1a',color:stagingPhotos.length>0?'#fff':'#444',fontWeight:600,fontSize:13,cursor:stagingPhotos.length>0?'pointer':'default',opacity:saving?0.6:1}}>{saving?'Saving...':'Save phase'}</button>
              </div>
            </>
          )}

          {view==='finish'&&(
            <>
              <div style={{padding:'10px 14px',background:'#8b5cf610',borderRadius:8,border:'1px solid #8b5cf633',marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:600,color:'#8b5cf6'}}>Finish — Phase {finishPhases.length+1} of {pin.finishPhasesRequired||1}</div>
              </div>
              <label style={L}>COMMENT</label>
              <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="Finish notes..." rows={2} style={{...I,resize:'none',marginBottom:12}}/>
              <label style={L}>FINISH PHOTO (min 1)</label>
              <StagingArea max={10} label="Add finish photo"/>
              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button onClick={()=>setView('status')} style={{flex:1,padding:'9px',background:'transparent',border:'1px solid #2a2a2a',borderRadius:8,color:'#888',fontSize:13,cursor:'pointer'}}>← Back</button>
                <button onClick={()=>savePhase('finish')} disabled={saving||stagingPhotos.length===0} style={{flex:2,padding:'10px',borderRadius:8,border:'none',background:stagingPhotos.length>0?'#8b5cf6':'#1a1a1a',color:stagingPhotos.length>0?'#fff':'#444',fontWeight:600,fontSize:13,cursor:stagingPhotos.length>0?'pointer':'default',opacity:saving?0.6:1}}>{saving?'Saving...':'Save phase'}</button>
              </div>
            </>
          )}
        </div>
      </div>
      {photoNav&&<PhotoNav photos={photoNav.photos} initIdx={photoNav.startIdx} onClose={()=>setPhotoNav(null)}/>}
    </div>
  );
}

// ── TRASH PANEL ───────────────────────────────────────────────────────────────
function TrashPanel({project,onRestore,onClose}){
  const trashed=project.elevations.flatMap((e,ei)=>(e.trash||[]).map(p=>({...p,_elev:e.name,_elevIdx:ei})));
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:250,padding:20}}>
      <div style={{background:'#0f0f0f',border:'1px solid #1e1e1e',borderRadius:14,width:460,maxWidth:'95vw',maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid #1e1e1e',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:700,color:'#fff'}}>🗑 Trash</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#444',fontSize:20,cursor:'pointer'}}>×</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'12px 20px'}}>
          {trashed.length===0
            ?<div style={{textAlign:'center',color:'#2a2a2a',fontSize:13,padding:'32px'}}>Trash is empty</div>
            :trashed.map((p,i)=>(
              <div key={i} style={{background:'#141414',border:'1px solid #1e1e1e',borderRadius:8,padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                    <div style={{background:pCol(p),borderRadius:'50%',width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',fontFamily:'DM Mono'}}>{p.id}</div>
                    <span style={{fontSize:13,fontWeight:500,color:'#d0d0d0'}}>{p.repairName||'Unnamed'}</span>
                  </div>
                  <div style={{fontSize:10,color:'#444',paddingLeft:27}}>{p._elev} · {getMeas(p)} · {fmtDate(p.deletedAt)}</div>
                </div>
                <button onClick={()=>onRestore(p._elevIdx,p.id)} style={{background:'#1d4ed820',border:'1px solid #2563eb44',borderRadius:7,color:'#60a5fa',fontSize:11,fontWeight:600,padding:'5px 12px',cursor:'pointer',flexShrink:0}}>Restore</button>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ── SUMMARY TABLE ─────────────────────────────────────────────────────────────
function SummaryTable({project,onClose}){
  const [photoNav,setPhotoNav]=useState(null);
  const [filter,setFilter]=useState('all');
  const allPins=project.elevations.flatMap(e=>(e.pins||[]).map(p=>({...p,_elev:e.name})));
  const types=[...new Set(allPins.map(p=>p.repairType))].filter(Boolean);
  const filtered=filter==='all'?allPins:allPins.filter(p=>p.repairType===filter);
  const totalsMap={};
  filtered.forEach(pin=>{
    const r=RT.find(r=>r.id===pin.repairType);if(!r)return;
    const key=pin.repairName+'__'+pin.repairType;
    if(!totalsMap[key])totalsMap[key]={repairName:pin.repairName,typeLabel:r.label,unit:r.unit,vals:[],count:0};
    totalsMap[key].count++;
    const latest=(pin.phases||[]).slice(-1)[0];
    const m=latest?latest.measurements:pin.measurements;
    const raw=r.calc(m||{});
    const num=parseFloat(raw);
    if(!isNaN(num)&&num>0)totalsMap[key].vals.push(num);
  });
  const th={padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:600,color:'#555',borderBottom:'1px solid #1e1e1e',whiteSpace:'nowrap'};
  const td={padding:'8px 12px',fontSize:12,borderBottom:'1px solid #141414',verticalAlign:'middle'};
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.9)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:250,padding:16}}>
      <div style={{background:'#0f0f0f',border:'1px solid #1e1e1e',borderRadius:14,width:'100%',maxWidth:1000,maxHeight:'92vh',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid #1e1e1e',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{fontSize:17,fontWeight:700,color:'#fff'}}>{project.name}</div>
            <div style={{fontSize:11,color:'#444',marginTop:2}}>Survey · {new Date().toLocaleDateString('en-NZ')} · {USER}</div>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <select value={filter} onChange={e=>setFilter(e.target.value)} style={{background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:7,padding:'6px 10px',color:'#e0e0e0',fontSize:12,outline:'none',cursor:'pointer'}}>
              <option value="all">All types</option>
              {types.map(t=><option key={t} value={t}>{(RT.find(r=>r.id===t)||{label:t}).label}</option>)}
            </select>
            <button onClick={onClose} style={{background:'none',border:'none',color:'#444',fontSize:22,cursor:'pointer'}}>×</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'14px 20px'}}>
          {project.elevations.map((el,ei)=>{
            const ePins=filtered.filter(p=>p._elev===el.name);
            if(!ePins.length)return null;
            return(
              <div key={ei} style={{marginBottom:24}}>
                <div style={{fontSize:12,fontWeight:600,color:'#d0d0d0',marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:9,color:'#3b82f6',background:'#1d4ed820',padding:'2px 7px',borderRadius:4,letterSpacing:1}}>ELEVATION</span>
                  {el.name}
                  <span style={{fontSize:10,color:'#333',fontFamily:'DM Mono'}}>{ePins.length} pin{ePins.length!==1?'s':''}</span>
                </div>
                <table style={{width:'100%',borderCollapse:'collapse',background:'#111',border:'1px solid #1e1e1e',borderRadius:8,overflow:'hidden'}}>
                  <thead><tr style={{background:'#141414'}}>{['ID','Name','Type','Measurement','Status','Hazard','Photos','Comment'].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                  <tbody>
                    {ePins.map(pin=>{
                      const allP=[...(pin.surveyPhotos||[]),...(pin.phases||[]).flatMap(ph=>ph.photos||[]),...(pin.finishPhases||[]).flatMap(ph=>ph.photos||[])];
                      const sc=SC[pin.status]||'#555';
                      const latestPhase=(pin.phases||[]).slice(-1)[0];
                      const displayMeas=latestPhase?getMeas(pin,latestPhase.measurements):getMeas(pin);
                      return(
                        <tr key={pin.id}>
                          <td style={td}><div style={{background:pCol(pin),borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#fff',fontFamily:'DM Mono'}}>{pin.id}</div></td>
                          <td style={{...td,fontWeight:500,color:'#e0e0e0'}}>{pin.repairName||'—'}</td>
                          <td style={{...td,fontFamily:'DM Mono',color:'#888',fontSize:11}}>{(RT.find(r=>r.id===pin.repairType)||{label:'—'}).label}</td>
                          <td style={{...td,fontFamily:'DM Mono',color:'#60a5fa',fontSize:11}}>{displayMeas}</td>
                          <td style={td}><span style={{fontSize:10,fontWeight:600,color:sc,background:sc+'18',padding:'2px 8px',borderRadius:8}}>{SL[pin.status]||'—'}</span></td>
                          <td style={td}>{pin.hazard?<span style={{fontSize:10,fontWeight:700,color:HC[pin.hazard],background:HC[pin.hazard]+'18',padding:'2px 6px',borderRadius:6}}>{(HAZARDS.find(h=>h.id===pin.hazard)||{label:''}).label}</span>:<span style={{color:'#2a2a2a'}}>—</span>}</td>
                          <td style={td}>{allP.length>0?(
                            <div style={{display:'flex',alignItems:'center',gap:4}}>
                              <div onClick={()=>setPhotoNav({photos:allP,startIdx:0})} style={{width:40,height:30,borderRadius:4,overflow:'hidden',cursor:'pointer',border:'1px solid #2a2a2a',flexShrink:0}}>
                                <img src={allP[0]} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                              </div>
                              {allP.length>1&&<span onClick={()=>setPhotoNav({photos:allP,startIdx:0})} style={{fontSize:10,color:'#60a5fa',cursor:'pointer'}}>+{allP.length-1}</span>}
                            </div>
                          ):<span style={{color:'#2a2a2a',fontSize:11}}>—</span>}</td>
                          <td style={{...td,color:'#555',fontSize:11,maxWidth:130}}>{pin.comment||'—'}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          })}
          {Object.keys(totalsMap).length>0&&(
            <div style={{marginTop:8,padding:'14px 16px',background:'#111',border:'1px solid #1e1e1e',borderRadius:10}}>
              <div style={{fontSize:9,color:'#444',letterSpacing:1.5,marginBottom:10}}>TOTALS</div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                {Object.entries(totalsMap).map(([k,v])=>(
                  <div key={k} style={{background:'#141414',borderRadius:8,padding:'10px 16px',border:'1px solid #1e1e1e',minWidth:140}}>
                    <div style={{fontSize:11,color:'#d0d0d0',fontWeight:500,marginBottom:1}}>{v.repairName}</div>
                    <div style={{fontSize:9,color:'#444',fontFamily:'DM Mono',marginBottom:6}}>× {v.typeLabel}</div>
                    <div style={{fontSize:17,fontWeight:700,color:'#60a5fa',fontFamily:'DM Mono'}}>{v.vals.reduce((a,b)=>a+b,0).toFixed(3)} <span style={{fontSize:10,color:'#444'}}>{v.unit}</span></div>
                    <div style={{fontSize:9,color:'#2a2a2a',marginTop:2}}>{v.count} item{v.count!==1?'s':''}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {!filtered.length&&<div style={{textAlign:'center',color:'#333',fontSize:13,padding:'40px'}}>No pins</div>}
        </div>
      </div>
      {photoNav&&<PhotoNav photos={photoNav.photos} initIdx={photoNav.startIdx} onClose={()=>setPhotoNav(null)}/>}
    </div>
  );
}

// ── PIN MARKER ────────────────────────────────────────────────────────────────
function Marker({pin,selected,isMoving,isDeleting,onClick,x,y}){
  const c=pCol(pin);const sz=isMoving||selected||isDeleting?28:22;
  const sc=SC[pin.status]||c;
  return(
    <div onClick={e=>{e.stopPropagation();onClick(pin.id);}} style={{position:'absolute',left:x,top:y,transform:'translate(-50%,-100%)',cursor:isDeleting?'not-allowed':'pointer',zIndex:10,userSelect:'none'}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div style={{background:isDeleting?'#ef4444':isMoving?'#f97316':selected?'#fff':c,color:isDeleting||isMoving?'#fff':selected?c:'#fff',border:'2px solid '+(isDeleting?'#ef4444':isMoving?'#f97316':c),borderRadius:'50%',width:sz,height:sz,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,fontFamily:'DM Mono',boxShadow:selected?'0 0 0 3px '+c+'40':'0 2px 8px rgba(0,0,0,0.6)',transition:'all 0.15s'}}>{isDeleting?'✕':pin.id}</div>
        <div style={{width:2,height:8,background:sc,opacity:0.9}}/>
        <div style={{width:6,height:6,borderRadius:'50%',background:sc}}/>
      </div>
    </div>
  );
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function Toast({msg}){
  return(
    <div style={{position:'fixed',bottom:60,left:'50%',transform:'translateX(-50%)',background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:20,padding:'8px 20px',fontSize:12,color:'#e0e0e0',zIndex:500,pointerEvents:'none',boxShadow:'0 4px 20px rgba(0,0,0,0.6)'}}>
      {msg}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('home');
  const [project,setProject]=useState(null);
  const [rl,setRl]=useState([]);
  const [ae,setAe]=useState(0);
  const [mode,setMode]=useState('pan');
  const [movId,setMovId]=useState(null);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [drag,setDrag]=useState(false);
  const [ds,setDs]=useState(null);
  const [selPin,setSelPin]=useState(null);
  const [modal,setModal]=useState(null);
  const [nid,setNid]=useState(1);
  const [csz,setCsz]=useState({w:800,h:600});
  const [showT,setShowT]=useState(false);
  const [showTrash,setShowTrash]=useState(false);
  const [toast,setToast]=useState(null);
  const cRef=useRef(null);
  const iRef=useRef(null);

  useEffect(()=>{
    const obs=new ResizeObserver(entries=>{for(const e of entries)setCsz({w:e.contentRect.width,h:e.contentRect.height});});
    if(cRef.current)obs.observe(cRef.current);
    return()=>obs.disconnect();
  },[]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2200);};
  const persist=p=>{const list=loadProjs();const idx=list.findIndex(x=>x.id===p.id);if(idx>=0)list[idx]=p;else list.unshift(p);saveProjs(list);};

  const openProject=p=>{
    setProject(p);setRl(p.repairList||[]);
    const maxId=p.elevations.flatMap(e=>[...(e.pins||[]),...(e.trash||[])]).reduce((m,pi)=>Math.max(m,pi.id),0);
    setNid(maxId+1);setAe(0);setMode('pan');setScreen('survey');
  };
  const createProject=(name,names)=>{
    const p={id:Date.now().toString(),name,createdAt:new Date().toISOString(),user:USER,repairList:[],elevations:names.map(n=>({name:n,img:null,pins:[],trash:[]}))};
    persist(p);openProject(p);
  };

  const el=project?.elevations[ae];
  const upd=(i,fn)=>{setProject(p=>{const e=[...p.elevations];e[i]=fn(e[i]);const np={...p,elevations:e};persist(np);return np;});};
  const onPhoto=e=>{const f=e.target.files[0];if(!f)return;const u=URL.createObjectURL(f);upd(ae,el=>({...el,img:u}));setZoom(1);setPan({x:0,y:0});};
  const onWheel=e=>{e.preventDefault();setZoom(z=>Math.min(8,Math.max(0.3,z*(e.deltaY>0?0.85:1.18))));};
  const imgC=e=>{const img=iRef.current;if(!img)return null;const r=img.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*100,y=(e.clientY-r.top)/r.height*100;if(x<0||x>100||y<0||y>100)return null;return{x,y};};
  const cntC=e=>{const c=cRef.current;if(!c)return null;const r=c.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*100,y:(e.clientY-r.top)/r.height*100};};
  const onMD=e=>{if(mode==='pan'){setDrag(true);setDs({x:e.clientX-pan.x,y:e.clientY-pan.y});}};
  const onMM=e=>{if(drag&&mode==='pan')setPan({x:e.clientX-ds.x,y:e.clientY-ds.y});};
  const onMU=()=>setDrag(false);

  const onCanvas=e=>{
    if(drag)return;
    const coords=el?.img?imgC(e):cntC(e);if(!coords)return;
    if(mode==='pin'){
      const p={id:nid,x:coords.x,y:coords.y,repairName:'',repairType:'area',measurements:{},comment:'',hazard:'yellow',status:ST.SURVEY,surveyPhotos:[],phases:[],finishPhases:[]};
      upd(ae,el=>({...el,pins:[...el.pins,p]}));setNid(n=>n+1);setModal(p);
    }else if(mode==='move-pin'&&movId){
      upd(ae,el=>({...el,pins:el.pins.map(p=>p.id===movId?{...p,...coords}:p)}));setMovId(null);setMode('pan');
    }
  };

  const onPin=id=>{
    if(mode==='move-pin'){setMovId(id);return;}
    if(mode==='delete-pin'){
      const pin=el.pins.find(p=>p.id===id);
      const name=pin?pin.repairName||('Pin #'+id):'Pin #'+id;
      if(!confirm('Move "'+name+'" to trash?'))return;
      upd(ae,el=>{
        const pin=el.pins.find(p=>p.id===id);if(!pin)return el;
        return{...el,pins:el.pins.filter(p=>p.id!==id),trash:[...(el.trash||[]),{...pin,deletedAt:new Date().toISOString()}]};
      });
      setMode('pan');showToast('🗑 Pin #'+id+' sent to trash');
      return;
    }
    setSelPin(id);const p=el.pins.find(p=>p.id===id);if(p)setModal(p);
  };

  const savePin=u=>{upd(ae,el=>({...el,pins:el.pins.map(p=>p.id===u.id?u:p)}));setModal(null);setSelPin(null);};
  const trashPin=id=>{
    upd(ae,el=>{const pin=el.pins.find(p=>p.id===id);if(!pin)return el;return{...el,pins:el.pins.filter(p=>p.id!==id),trash:[...(el.trash||[]),{...pin,deletedAt:new Date().toISOString()}]};});
    setModal(null);setSelPin(null);showToast('🗑 Pin #'+id+' sent to trash');
  };
  const restorePin=(elevIdx,pinId)=>{
    upd(elevIdx,el=>{const pin=(el.trash||[]).find(p=>p.id===pinId);if(!pin)return el;const{deletedAt,...r}=pin;return{...el,pins:[...el.pins,r],trash:(el.trash||[]).filter(p=>p.id!==pinId)};});
    showToast('✓ Pin restored');
  };
  const addRT=r=>{const nl=rl.find(x=>x.name===r.name)?rl:[...rl,r];setRl(nl);setProject(p=>{const np={...p,repairList:nl};persist(np);return np;});};

  if(screen==='home')return<HomeScreen onOpen={openProject} onCreate={()=>setScreen('setup')}/>;
  if(screen==='setup')return<Setup onDone={createProject} onBack={()=>setScreen('home')}/>;

  const pins=el?.pins||[];
  const trashCount=project.elevations.reduce((s,e)=>s+(e.trash||[]).length,0);
  const iW=iRef.current?.offsetWidth||1,iH=iRef.current?.offsetHeight||1;
  const total=project.elevations.reduce((s,e)=>s+(e.pins||[]).length,0);
  const hint=mode==='pin'?'📍 Click to place a pin'
    :mode==='move-pin'?(movId?'Moving #'+movId+' — click to reposition':'Click a pin to move it')
    :mode==='delete-pin'?'🗑 Click a pin to trash it'
    :'✋ Drag to pan · scroll to zoom';

  const modes=[
    {id:'pan',     i:'✋',l:'Move building'},
    {id:'pin',     i:'📍',l:'Add pin'},
    {id:'move-pin',i:'↔', l:'Move pin'},
    {id:'delete-pin',i:'🗑',l:'Delete pin',danger:true}
  ];

  return(
    <div style={{display:'flex',height:'100vh',background:'#080808',overflow:'hidden',userSelect:'none'}}>
      {/* LEFT */}
      <div style={{width:196,background:'#0e0e0e',borderRight:'1px solid #181818',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'12px 14px',borderBottom:'1px solid #181818',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:9,color:'#333',letterSpacing:2,marginBottom:3}}>RAL SURVEY</div>
            <div style={{fontSize:11,fontWeight:600,color:'#d0d0d0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{project.name}</div>
          </div>
          <button onClick={()=>setScreen('home')} style={{background:'none',border:'1px solid #222',borderRadius:5,color:'#444',fontSize:11,cursor:'pointer',padding:'3px 7px',flexShrink:0,marginLeft:6}}>⌂</button>
        </div>
        <div style={{padding:'8px 12px',borderBottom:'1px solid #181818'}}>
          <label style={{display:'block',padding:'7px 10px',border:'1px dashed #252525',borderRadius:7,color:'#555',fontSize:11,cursor:'pointer',textAlign:'center'}}>
            {el?.img?'🔄 Change photo':'📷 Load photo'}
            <input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={onPhoto}/>
          </label>
        </div>
        <div style={{padding:'8px 12px',borderBottom:'1px solid #181818'}}>
          <div style={{fontSize:9,color:'#333',letterSpacing:1.5,marginBottom:6}}>MODE</div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {modes.map(m=>{
              const active=mode===m.id;
              const danger=m.danger;
              return(
                <button key={m.id} onClick={()=>{setMode(m.id);if(m.id!=='move-pin')setMovId(null);}}
                  style={{padding:'6px 10px',borderRadius:6,border:'1px solid '+(active?(danger?'#ef4444':'#2563eb'):'#1c1c1c'),background:active?(danger?'#ef444415':'#1d4ed815'):'transparent',color:active?(danger?'#ef4444':'#60a5fa'):(danger?'#444':'#555'),fontSize:12,fontWeight:active?600:400,cursor:'pointer',textAlign:'left',transition:'all 0.1s'}}>
                  {m.i} {m.l}
                </button>
              );
            })}
          </div>
          {mode==='move-pin'&&movId&&<div style={{fontSize:10,color:'#f97316',marginTop:6,padding:'4px 6px',background:'#f9731610',borderRadius:5}}>Moving #{movId}<br/>Click to reposition</div>}
          {mode==='delete-pin'&&<div style={{fontSize:10,color:'#ef4444',marginTop:6,padding:'4px 6px',background:'#ef444410',borderRadius:5}}>Click a pin to trash it</div>}
        </div>
        <div style={{padding:'8px 12px',borderBottom:'1px solid #181818'}}>
          <div style={{fontSize:9,color:'#333',letterSpacing:1.5,marginBottom:6}}>ZOOM {Math.round(zoom*100)}%</div>
          <div style={{display:'flex',gap:4}}>
            <button onClick={()=>setZoom(z=>Math.min(8,z*1.3))} style={{flex:1,padding:'5px',borderRadius:5,border:'1px solid #1c1c1c',background:'#151515',color:'#888',fontSize:15,cursor:'pointer'}}>+</button>
            <button onClick={()=>{setZoom(1);setPan({x:0,y:0});}} style={{flex:1,padding:'5px',borderRadius:5,border:'1px solid #1c1c1c',background:'#151515',color:'#666',fontSize:9,cursor:'pointer'}}>Reset</button>
            <button onClick={()=>setZoom(z=>Math.max(0.3,z*0.77))} style={{flex:1,padding:'5px',borderRadius:5,border:'1px solid #1c1c1c',background:'#151515',color:'#888',fontSize:15,cursor:'pointer'}}>−</button>
          </div>
        </div>
        {rl.length>0&&(
          <div style={{padding:'8px 12px',borderBottom:'1px solid #181818',maxHeight:110,overflowY:'auto'}}>
            <div style={{fontSize:9,color:'#333',letterSpacing:1.5,marginBottom:5}}>REPAIRS ({rl.length})</div>
            {rl.map((r,i)=>(
              <div key={i} style={{fontSize:10,color:'#555',padding:'2px 0',borderBottom:'1px solid #141414',display:'flex',justifyContent:'space-between'}}>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{r.name}</span>
                <span style={{color:'#2a2a2a',fontFamily:'DM Mono',marginLeft:4,flexShrink:0}}>{(RT.find(t=>t.id===r.type)||{unit:''}).unit}</span>
              </div>
            ))}
          </div>
        )}
        <div style={{flex:1}}/>
        <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:6}}>
          <button onClick={()=>setShowT(true)} style={{width:'100%',padding:'7px',borderRadius:7,border:'1px solid #2563eb44',background:'#2563eb10',color:'#60a5fa',fontSize:11,fontWeight:600,cursor:'pointer'}}>📊 Summary {total>0?'('+total+')':''}</button>
          <button onClick={()=>setShowTrash(true)} style={{width:'100%',padding:'7px',borderRadius:7,border:'1px solid #ef444430',background:'transparent',color:trashCount>0?'#ef444488':'#333',fontSize:11,cursor:'pointer'}}>🗑 Trash {trashCount>0?'('+trashCount+')':''}</button>
        </div>
      </div>

      {/* CENTER */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{display:'flex',background:'#0c0c0c',borderBottom:'1px solid #181818',overflowX:'auto',flexShrink:0}}>
          {project.elevations.map((e,i)=>(
            <button key={i} onClick={()=>{setAe(i);setMode('pan');setMovId(null);setSelPin(null);setZoom(1);setPan({x:0,y:0});}} style={{padding:'9px 14px',border:'none',borderBottom:'2px solid '+(i===ae?'#2563eb':'transparent'),background:'transparent',color:i===ae?'#60a5fa':'#444',fontSize:12,fontWeight:i===ae?600:400,cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
              {e.name}
              {(e.pins||[]).length>0&&<span style={{fontSize:9,color:'#333',background:'#1a1a1a',padding:'1px 5px',borderRadius:8,fontFamily:'DM Mono'}}>{e.pins.length}</span>}
              {e.img&&<span style={{fontSize:8,color:'#2a6a2a',background:'#0a2a0a',padding:'1px 4px',borderRadius:4}}>IMG</span>}
            </button>
          ))}
        </div>
        <div style={{flex:1,position:'relative',overflow:'hidden',cursor:mode==='pin'||mode==='move-pin'?'crosshair':mode==='delete-pin'?'not-allowed':drag?'grabbing':'grab'}}
          ref={cRef} onWheel={onWheel} onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onClick={onCanvas}>
          {!el?.img?(
            <>
              <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle,#1a1a1a 1px,transparent 1px)',backgroundSize:'28px 28px',opacity:0.4,pointerEvents:'none'}}/>
              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,pointerEvents:'none'}}>
                <div style={{fontSize:44,opacity:0.1}}>🏢</div>
                <div style={{fontSize:11,color:'#2a2a2a'}}>No photo — pins float on canvas</div>
              </div>
              {pins.map(p=><Marker key={p.id} pin={p} selected={selPin===p.id} isMoving={movId===p.id} isDeleting={mode==='delete-pin'} onClick={onPin} x={p.x*csz.w/100} y={p.y*csz.h/100}/>)}
            </>
          ):(
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{transform:'translate('+pan.x+'px,'+pan.y+'px) scale('+zoom+')',transformOrigin:'center center',position:'relative',display:'inline-block'}}>
                <img ref={iRef} src={el.img} alt="" style={{display:'block',maxWidth:'72vw',maxHeight:'88vh',objectFit:'contain',pointerEvents:'none'}} draggable={false}/>
                <div style={{position:'absolute',inset:0}}>
                  {pins.map(p=><Marker key={p.id} pin={p} selected={selPin===p.id} isMoving={movId===p.id} isDeleting={mode==='delete-pin'} onClick={onPin} x={p.x*iW/100} y={p.y*iH/100}/>)}
                </div>
              </div>
            </div>
          )}
          <div style={{position:'absolute',bottom:12,left:'50%',transform:'translateX(-50%)',background:'rgba(10,10,10,0.88)',border:'1px solid '+(mode==='delete-pin'?'#ef444440':'#1e1e1e'),borderRadius:20,padding:'5px 14px',fontSize:11,color:mode==='pin'||mode==='move-pin'?'#f97316':mode==='delete-pin'?'#ef4444':'#3b82f6',pointerEvents:'none'}}>{hint}</div>
          <div style={{position:'absolute',top:12,left:12,background:'rgba(10,10,10,0.88)',border:'1px solid #1e1e1e',borderRadius:8,padding:'5px 12px',fontSize:10,color:'#4ade80',fontWeight:600,letterSpacing:1.5,pointerEvents:'none'}}>{(el?.name||'').toUpperCase()} · {project.name}</div>
        </div>
      </div>

      {/* RIGHT INDEX */}
      {pins.length>0&&(
        <div style={{width:200,background:'#0c0c0c',borderLeft:'1px solid #181818',display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{padding:'10px 14px',borderBottom:'1px solid #181818',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:9,color:'#333',letterSpacing:2}}>INDEX</span>
            <span style={{fontSize:9,color:'#2a2a2a',fontFamily:'DM Mono'}}>{pins.length}</span>
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {pins.map(p=>{
              const sc=SC[p.status]||'#555';
              return(
                <div key={p.id} onClick={()=>{if(mode!=='delete-pin')onPin(p.id);}} style={{padding:'9px 14px',borderBottom:'1px solid #141414',cursor:'pointer',background:selPin===p.id?'#141414':'transparent'}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                    <div style={{background:pCol(p),borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',flexShrink:0,fontFamily:'DM Mono'}}>{p.id}</div>
                    <span style={{fontSize:12,fontWeight:500,color:'#d0d0d0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{p.repairName||'Unnamed'}</span>
                  </div>
                  <div style={{paddingLeft:25,display:'flex',gap:5,alignItems:'center'}}>
                    <span style={{fontSize:9,fontWeight:600,color:sc,background:sc+'18',padding:'1px 5px',borderRadius:5}}>{SL[p.status]||'new'}</span>
                    {p.hazard&&<span style={{fontSize:9,color:HC[p.hazard]}}>●</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {modal&&<PinModal pin={modal} repairList={rl} onSave={savePin} onTrash={trashPin} onClose={()=>{setModal(null);setSelPin(null);}} onAddRT={addRT} projectName={project.name} elevName={el?.name||''}/>}
      {showT&&<SummaryTable project={project} onClose={()=>setShowT(false)}/>}
      {showTrash&&<TrashPanel project={project} onRestore={restorePin} onClose={()=>setShowTrash(false)}/>}
      {toast&&<Toast msg={toast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
